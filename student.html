<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תיירות דיגיטלית — עבודת הקבוצה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #3B82F6; --blue-dark: #2563EB; --blue-light: #93C5FD;
      --dark: #0A0F1E; --dark2: #111827; --dark3: #1F2937; --dark4: #374151;
      --text: #F9FAFB; --muted: #9CA3AF; --error: #EF4444;
      --success: #10B981; --warning: #F59E0B;
      --teal: #14B8A6; --purple: #8B5CF6; --purple-light: #A78BFA;
    }
    body { font-family: 'Heebo', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

    /* TOPBAR */
    .topbar { background: var(--dark2); border-bottom: 1px solid rgba(255,255,255,0.07); padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-logo { font-size: 16px; font-weight: 800; background: linear-gradient(135deg, var(--blue-light), var(--purple-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .topbar-subject { font-size: 12px; font-weight: 700; color: var(--teal); }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .btn-sm { padding: 6px 12px; border-radius: 7px; font-family: 'Heebo', sans-serif; font-size: 12px; cursor: pointer; border: none; }
    .btn-back { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: var(--muted); }
    .btn-save { background: var(--teal); color: white; font-weight: 700; display: none; }
    .btn-save.show { display: block; }
    .btn-save:disabled { opacity: 0.6; }

    /* LAYOUT */
    .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 60px); }

    /* SIDEBAR */
    .sidebar { background: var(--dark2); border-left: 1px solid rgba(255,255,255,0.07); padding: 20px; display: flex; flex-direction: column; gap: 6px; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
    .sidebar-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; margin-top: 4px; }
    .section-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 9px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
    .section-item:hover { background: var(--dark3); }
    .section-item.active { background: rgba(20,184,166,0.1); border-color: rgba(20,184,166,0.3); }
    .section-item.done { opacity: 0.7; }
    .section-item.locked { opacity: 0.35; pointer-events: none; }
    .section-icon { font-size: 16px; flex-shrink: 0; }
    .section-info { flex: 1; }
    .section-num-label { font-size: 10px; color: var(--muted); }
    .section-name-label { font-size: 13px; font-weight: 600; }
    .section-check { font-size: 14px; }

    /* PROGRESS in sidebar */
    .sidebar-progress { margin-bottom: 16px; padding: 14px; background: var(--dark3); border-radius: 10px; }
    .sp-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
    .sp-bar { height: 5px; background: var(--dark4); border-radius: 3px; overflow: hidden; }
    .sp-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--teal), var(--blue)); transition: width 0.5s; }

    /* PARTNER ONLINE */
    .partner-status { padding: 10px 12px; background: var(--dark3); border-radius: 9px; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .partner-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .partner-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .partner-name { font-size: 12px; color: var(--muted); }

    /* CHATBOT BUTTON */
    .chatbot-btn { margin-top: auto; padding: 12px; background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.3); border-radius: 10px; color: var(--purple-light); font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.2s; }
    .chatbot-btn:hover { background: rgba(139,92,246,0.2); }
    .files-btn { padding: 12px; background: rgba(20,184,166,0.1); border: 1px solid rgba(20,184,166,0.3); border-radius: 10px; color: var(--teal); font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.2s; }
    .files-btn:hover { background: rgba(20,184,166,0.2); }

    /* CONTENT */
    .content { padding: 28px; max-width: 800px; }
    .section-header { margin-bottom: 24px; }
    .section-number { font-size: 12px; color: var(--teal); font-weight: 700; margin-bottom: 4px; }
    .section-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .section-desc { font-size: 14px; color: var(--muted); line-height: 1.7; }

    /* FIELDS */
    .field-group { margin-bottom: 20px; }
    .field-label { font-size: 13px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .field-required { color: var(--teal); font-size: 11px; }
    .field-textarea { width: 100%; padding: 14px; background: var(--dark2); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 14px; outline: none; resize: vertical; min-height: 120px; line-height: 1.6; direction: rtl; transition: border-color 0.2s; }
    .field-textarea:focus { border-color: rgba(20,184,166,0.4); box-shadow: 0 0 0 3px rgba(20,184,166,0.08); }
    .field-input { width: 100%; padding: 12px 14px; background: var(--dark2); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 14px; outline: none; direction: rtl; transition: border-color 0.2s; }
    .field-input:focus { border-color: rgba(20,184,166,0.4); }
    .field-hint { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }

    /* SAVE STATUS */
    .save-status { font-size: 12px; color: var(--muted); margin-top: 6px; transition: all 0.3s; }
    .save-status.saving { color: var(--warning); }
    .save-status.saved  { color: var(--success); }

    /* NAVIGATION BUTTONS */
    .nav-btns { display: flex; justify-content: space-between; margin-top: 32px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.07); }
    .btn-nav { padding: 11px 20px; border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-prev { background: var(--dark3); color: var(--muted); }
    .btn-prev:hover { color: var(--text); }
    .btn-next { background: var(--teal); color: white; }
    .btn-next:hover { background: #0d9488; }
    .btn-next:disabled { opacity: 0.5; cursor: not-allowed; }

    /* CHATBOT PANEL */
    .chatbot-panel { position: fixed; bottom: 24px; left: 24px; width: 340px; background: var(--dark2); border: 1px solid rgba(139,92,246,0.3); border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); display: none; flex-direction: column; z-index: 300; }
    .chatbot-panel.show { display: flex; }
    .chatbot-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .chatbot-title { font-size: 14px; font-weight: 700; color: var(--purple-light); }
    .chatbot-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
    .chatbot-messages { flex: 1; padding: 14px; max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 10px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; max-width: 85%; }
    .msg-bot { background: var(--dark3); align-self: flex-start; }
    .msg-user { background: rgba(59,130,246,0.15); align-self: flex-end; }
    .chatbot-input-wrap { display: flex; gap: 8px; padding: 12px; border-top: 1px solid rgba(255,255,255,0.07); }
    .chatbot-input { flex: 1; padding: 9px 12px; background: var(--dark3); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 13px; outline: none; direction: rtl; }
    .chatbot-send { padding: 9px 14px; background: var(--purple); border: none; border-radius: 8px; color: white; font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }

    /* FILES PANEL */
    .files-panel { position: fixed; bottom: 24px; left: 380px; width: 320px; background: var(--dark2); border: 1px solid rgba(20,184,166,0.3); border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); display: none; flex-direction: column; z-index: 300; max-height: 420px; }
    .files-panel.show { display: flex; }
    .files-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .files-title { font-size: 14px; font-weight: 700; color: var(--teal); }
    .files-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
    .files-list { flex: 1; padding: 12px 16px; max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .file-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: var(--dark3); border-radius: 8px; font-size: 12px; }
    .file-item a { color: var(--blue-light); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .files-upload-wrap { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.07); }
    .files-upload-wrap input[type=file] { width: 100%; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .files-upload-btn { width: 100%; padding: 9px; background: var(--teal); border: none; border-radius: 8px; color: white; font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
    .files-status { font-size: 11px; color: var(--muted); margin-top: 6px; }

    @media (max-width: 768px) {
      .files-panel { left: 16px; bottom: 24px; width: calc(100% - 32px); }
    }

    .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: relative; top: 0; height: auto; border-left: none; border-bottom: 1px solid rgba(255,255,255,0.07); flex-direction: row; flex-wrap: wrap; gap: 4px; padding: 12px; }
      .sidebar-title { display: none; }
      .section-item { padding: 6px 10px; }
      .section-info { display: none; }
      .chatbot-panel { width: calc(100% - 32px); left: 16px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">כיתה פלוס</div>
    <div class="topbar-subject">🗺️ תיירות דיגיטלית</div>
  </div>
  <div class="topbar-right">
    <button class="btn-sm btn-save" id="saveBtn" onclick="saveSection()">💾 שמור</button>
    <button class="btn-sm btn-back" onclick="goBack()">← הדשבורד שלי</button>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-progress">
      <div class="sp-label">
        <span style="font-size:12px;color:var(--muted)">התקדמות</span>
        <span style="font-size:12px;font-weight:700;color:var(--teal)" id="progressPct">0%</span>
      </div>
      <div class="sp-bar"><div class="sp-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div class="partner-status">
      <div class="partner-dot" id="partnerDot"></div>
      <div class="partner-name" id="partnerLabel">חברי הקבוצה: טוען...</div>
    </div>

    <div class="sidebar-title">הסעיפים</div>
    <div id="sectionNav"></div>

    <button class="files-btn" onclick="toggleFiles()">📎 קבצים</button>
    <button class="chatbot-btn" onclick="toggleChatbot()">🤖 עזרה מהבוט</button>
  </div>

  <!-- CONTENT -->
  <div class="content" id="sectionContent">
    <div style="text-align:center;padding:60px 20px;">
      <span class="loading-spinner" style="width:32px;height:32px;border-width:3px;"></span>
      <div style="margin-top:16px;color:var(--muted);">טוען...</div>
    </div>
  </div>
</div>

<!-- CHATBOT -->
<div class="chatbot-panel" id="chatbotPanel">
  <div class="chatbot-header">
    <div class="chatbot-title">🤖 עוזר הלימוד</div>
    <button class="chatbot-close" onclick="toggleChatbot()">×</button>
  </div>
  <div class="chatbot-messages" id="chatMessages">
    <div class="msg msg-bot">שלום! אני כאן לעזור. במה תקוע/ה?</div>
  </div>
  <div class="chatbot-input-wrap">
    <input class="chatbot-input" id="chatInput" placeholder="כתוב שאלה..." onkeydown="if(event.key==='Enter')sendChat()" />
    <button class="chatbot-send" onclick="sendChat()">שלח</button>
  </div>
</div>

<!-- FILES -->
<div class="files-panel" id="filesPanel">
  <div class="files-header">
    <div class="files-title">📎 קבצי הקבוצה</div>
    <button class="files-close" onclick="toggleFiles()">×</button>
  </div>
  <div class="files-list" id="filesList"><div style="color:var(--muted);font-size:12px;">טוען...</div></div>
  <div class="files-upload-wrap">
    <input type="file" id="fileInput" />
    <button class="files-upload-btn" onclick="uploadSelectedFile()">העלה קובץ</button>
    <div class="files-status" id="filesStatus"></div>
  </div>
</div>

<script>
const TICHER_URL  = 'https://nisan1234-afk.github.io/TICHER/';
const API_URL     = 'https://script.google.com/macros/s/AKfycbwf3-MNZBBi64zXcNH7wfhBRoEBl9brtQ9QRI4Won5RmUIOrl_WBivN6uI5NAp6Mc0h/exec';
// מפתח Gemini API נשמר בשרת (Apps Script Script Properties) — לא כאן, כדי שלא ייחשף לציבור ב-GitHub Pages

const SECTIONS = [
  { num:1, name:'פרטי האתר',          icon:'📍', desc:'תאר את אתר התיירות שבחרתם — מיקום, סוג, קהל יעד, מה מיוחד בו.',
    fields:[{id:'site_basic',label:'פרטי האתר הבסיסיים',hint:'שם, מיקום, סוג אתר תיירות',type:'textarea'},
            {id:'site_target',label:'קהל יעד',hint:'מי מגיע לאתר? גיל, מוצא, עניין',type:'textarea'},
            {id:'site_unique',label:'מה מיוחד באתר?',hint:'מה מבדיל אותו ממתחרים?',type:'textarea'}] },
  { num:2, name:'תיאור כללי',          icon:'📄', desc:'תאר את האתר באופן כללי — היסטוריה, חשיבות, מה הוא מציע למבקרים.',
    fields:[{id:'general_history',label:'היסטוריה ורקע',hint:'מתי הוקם? כיצד התפתח?',type:'textarea'},
            {id:'general_offer',label:'מה האתר מציע?',hint:'אטרקציות, שירותים, חוויות',type:'textarea'}] },
  { num:3, name:'נוכחות דיגיטלית',     icon:'📱', desc:'נתח את הנוכחות הדיגיטלית של האתר — אתר אינטרנט, רשתות חברתיות, ביקורות.',
    fields:[{id:'digital_website',label:'אתר האינטרנט',hint:'קיים? עדכני? נגיש למובייל?',type:'textarea'},
            {id:'digital_social',label:'רשתות חברתיות',hint:'אינסטגרם, פייסבוק, טיקטוק — ניתוח קצר',type:'textarea'},
            {id:'digital_reviews',label:'ביקורות ודירוגים',hint:'גוגל, טריפאדוויזור — ממוצע ותוכן',type:'textarea'}] },
  { num:4, name:'מושגים',              icon:'📚', desc:'קשר בין מושגים שלמדת לבין האתר שבחרת.',
    fields:[{id:'concepts_list',label:'מושגים רלוונטיים',hint:'לדוגמה: כלכלה שיתופית, ביג דאטה, SEO...',type:'textarea'},
            {id:'concepts_apply',label:'כיצד מושגים אלו קשורים לאתר?',hint:'הסבר לכל מושג כיצד הוא בא לידי ביטוי',type:'textarea'}] },
  { num:5, name:'חוויית משתמש',        icon:'🖥️', desc:'נתח את חוויית המשתמש הדיגיטלית — קלות שימוש, עיצוב, נגישות.',
    fields:[{id:'ux_ease',label:'קלות שימוש',hint:'האם קל למצוא מידע? ניווט ברור?',type:'textarea'},
            {id:'ux_design',label:'עיצוב ויזואלי',hint:'צבעים, תמונות, פונטים — רושם כללי',type:'textarea'},
            {id:'ux_mobile',label:'גרסה מובייל',hint:'האם האתר מותאם לטלפון?',type:'textarea'}] },
  { num:6, name:'עוצמות',              icon:'💪', desc:'מה האתר עושה טוב בתחום הדיגיטלי? אילו נקודות חוזקה בולטות?',
    fields:[{id:'strengths_main',label:'עוצמות דיגיטליות',hint:'לפחות 3 נקודות חוזקה מנומקות',type:'textarea'},
            {id:'strengths_example',label:'דוגמה בולטת',hint:'הצג דוגמה ספציפית לנוכחות דיגיטלית מוצלחת',type:'textarea'}] },
  { num:7, name:'הצעות לשיפור',        icon:'💡', desc:'הציעו שיפורים דיגיטליים ממשיים לאתר — חשבו כמו יועצי דיגיטל.',
    fields:[{id:'improve_ideas',label:'הצעות לשיפור',hint:'לפחות 3 הצעות ממשיות ומנומקות',type:'textarea'},
            {id:'improve_priority',label:'הצעה מועדפת',hint:'איזו הצעה הכי חשובה? למה?',type:'textarea'},
            {id:'improve_how',label:'כיצד תיישמו אותה?',hint:'תיאור צעדים מעשיים',type:'textarea'}] },
  { num:8, name:'סיכום אישי',          icon:'✍️', desc:'כתב סיכום אישי — מה למדת, מה הפתיע אותך, מה תקח איתך.',
    fields:[{id:'personal_learned',label:'מה למדתי',hint:'3 דברים שלמדת מהפרויקט',type:'textarea'},
            {id:'personal_surprise',label:'מה הפתיע אותי',hint:'גילוי מעניין שלא ציפית אליו',type:'textarea'},
            {id:'personal_takeaway',label:'מה אני לוקח/ת איתי',hint:'כיצד זה ישפיע על הסתכלותך על אתרי תיירות?',type:'textarea'}] }
];

let currentUser   = null;
let groupData     = null;
let currentSection = 1;
let sectionContent = {};
let saveTimer      = null;
let hasChanges     = false;

window.onload = async function() {
  const stored = sessionStorage.getItem('kitahUser');
  if (!stored) { window.location.href = TICHER_URL; return; }
  currentUser = JSON.parse(stored);

  const startSection = parseInt(sessionStorage.getItem('currentSection')) || 1;
  await loadGroupData();
  navigateTo(startSection);
};

async function callAPI(action, params = {}) {
  const res  = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, token: currentUser.token, ...params }) });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error);
  return data.data;
}

async function loadGroupData() {
  try {
    const dashData = await callAPI('getTeacherDashboard');
    const groups   = dashData.groups || [];
    const email    = currentUser.email;
    const myGroup  = groups.find(g => (g.members || []).some(m => m.toLowerCase() === email.toLowerCase()));
    if (!myGroup) throw new Error('לא שויכת לקבוצה');

    const detail = await callAPI('getGroupData', { group_id: myGroup.group_id });
    groupData = { ...myGroup, ...detail.group };
    sectionContent = detail.sections || {};

    // חברי הקבוצה מלבדי
    const others = (groupData.members || []).filter(m => m.toLowerCase() !== email.toLowerCase());
    document.getElementById('partnerLabel').textContent = others.length
      ? 'חברי הקבוצה: ' + others.map(m => m.split('@')[0]).join(', ')
      : 'עובד/ת לבד בקבוצה זו';

    renderSectionNav();
    updateProgress();
  } catch(e) {
    document.getElementById('sectionContent').innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);">שגיאה: ' + e.message + '</div>';
  }
}

function renderSectionNav() {
  const nav = document.getElementById('sectionNav');
  const cur = parseInt(groupData.current_section) || 1;

  nav.innerHTML = SECTIONS.map(s => {
    const isDone    = sectionContent['section_'+s.num] ? true : false;
    const isCurrent = s.num === currentSection;
    const isLocked  = s.num > cur;
    const cls = isLocked ? 'locked' : isDone ? 'done' : '';
    const active = isCurrent ? 'active' : '';
    const check = isDone ? '✅' : isLocked ? '🔒' : '';

    return `<div class="section-item ${cls} ${active}" onclick="navigateTo(${s.num})">
      <div class="section-icon">${s.icon}</div>
      <div class="section-info">
        <div class="section-num-label">סעיף ${s.num}</div>
        <div class="section-name-label">${s.name}</div>
      </div>
      <div class="section-check">${check}</div>
    </div>`;
  }).join('');
}

function navigateTo(num) {
  if (hasChanges) { saveSection(); }
  currentSection = num;
  sessionStorage.setItem('currentSection', num);

  const sec = SECTIONS[num - 1];
  const saved = sectionContent['section_'+num] || '';
  let savedData = {};
  try { savedData = JSON.parse(saved); } catch(e) { savedData = {}; }

  const fieldsHTML = sec.fields.map(f => `
    <div class="field-group">
      <div class="field-label">${f.label} <span class="field-required">*</span></div>
      ${f.type === 'textarea'
        ? `<textarea class="field-textarea" id="field_${f.id}" rows="5" oninput="onFieldChange()" placeholder="${f.hint||''}">${savedData[f.id]||''}</textarea>`
        : `<input class="field-input" id="field_${f.id}" type="text" oninput="onFieldChange()" placeholder="${f.hint||''}" value="${savedData[f.id]||''}" />`
      }
      ${f.hint ? `<div class="field-hint">💡 ${f.hint}</div>` : ''}
    </div>
  `).join('');

  const cur = parseInt(groupData.current_section) || 1;
  const isLocked = num > cur;

  const siteHTML = num === 1 ? `
    <div class="field-group" style="padding:16px;background:var(--dark2);border:1px solid rgba(255,255,255,0.08);border-radius:12px;">
      <div class="field-label">🗺️ האתר שבחרתם</div>
      <input class="field-input" id="siteNameInput" type="text" placeholder="שם אתר התיירות" value="${groupData.site_name || ''}" style="margin-bottom:8px;" />
      <input class="field-input" id="siteUrlInput" type="text" placeholder="קישור לאתר/עמוד (אופציונלי)" value="${groupData.site_url || ''}" />
      <button class="btn-nav btn-next" style="margin-top:10px;" onclick="proposeSite()">בדוק והגדר אתר</button>
      <div id="siteFeedback" style="margin-top:10px;font-size:13px;color:var(--muted);"></div>
    </div>
  ` : '';

  document.getElementById('sectionContent').innerHTML = `
    <div class="section-header">
      <div class="section-number">סעיף ${num} מתוך 8</div>
      <div class="section-title">${sec.icon} ${sec.name}</div>
      <div class="section-desc">${sec.desc}</div>
    </div>
    ${siteHTML}
    ${isLocked ? '<div style="padding:20px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:12px;color:var(--error);font-size:14px;">🔒 סעיף זה נעול עדיין — המורה יפתח אותו בזמן המתאים.</div>' : fieldsHTML}
    ${!isLocked ? `
    <div class="nav-btns">
      <button class="btn-nav btn-prev" onclick="navigateTo(${num-1})" ${num===1?'style="visibility:hidden"':''}>→ הקודם</button>
      <div>
        <span class="save-status" id="saveStatus">שינויים לא נשמרו</span>
      </div>
      <button class="btn-nav btn-next" onclick="saveAndNext()" ${num===8?'disabled':''}>הבא ←</button>
    </div>` : ''}
  `;

  document.getElementById('saveBtn').classList.toggle('show', !isLocked);
  hasChanges = false;
  renderSectionNav();
}

async function proposeSite() {
  const name = document.getElementById('siteNameInput').value.trim();
  const url  = document.getElementById('siteUrlInput').value.trim();
  const fb   = document.getElementById('siteFeedback');
  if (!name) { fb.textContent = 'נא להכניס שם אתר'; fb.style.color = 'var(--error)'; return; }

  fb.textContent = 'בודק...'; fb.style.color = 'var(--muted)';
  try {
    const data = await callAPI('proposeSite', { group_id: groupData.group_id, site_name: name, site_url: url });
    groupData.site_name = data.site_name;
    groupData.site_url  = data.site_url;
    fb.textContent = data.feedback; fb.style.color = 'var(--teal)';
  } catch(e) {
    fb.textContent = 'שגיאה: ' + e.message; fb.style.color = 'var(--error)';
  }
}

function onFieldChange() {
  hasChanges = true;
  const status = document.getElementById('saveStatus');
  if (status) { status.textContent = 'שינויים לא נשמרו'; status.className = 'save-status'; }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveSection(true), 3000); // שמירה אוטומטית אחרי 3 שניות
}

async function saveSection(auto = false) {
  if (!groupData) return;
  const sec = SECTIONS[currentSection - 1];
  const data = {};
  sec.fields.forEach(f => {
    const el = document.getElementById('field_' + f.id);
    if (el) data[f.id] = el.value;
  });

  const status = document.getElementById('saveStatus');
  if (status) { status.textContent = 'שומר...'; status.className = 'save-status saving'; }

  try {
    await callAPI('saveSection', {
      group_id:     groupData.group_id,
      section_num:  currentSection,
      content:      JSON.stringify(data),
      device_id:    navigator.userAgent.slice(0,50)
    });
    sectionContent['section_'+currentSection] = JSON.stringify(data);
    hasChanges = false;
    if (status) { status.textContent = auto ? 'נשמר אוטומטית ✓' : 'נשמר ✓'; status.className = 'save-status saved'; }
    updateProgress();
    renderSectionNav();
  } catch(e) {
    if (status) { status.textContent = 'שגיאה בשמירה'; status.className = 'save-status'; }
  }
}

async function saveAndNext() {
  await saveSection();
  if (currentSection < 8) navigateTo(currentSection + 1);
}

function updateProgress() {
  const done = Object.keys(sectionContent).filter(k => k.startsWith('section_') && sectionContent[k]).length;
  const pct  = Math.round((done / 8) * 100);
  const fill = document.getElementById('progressFill');
  const pctEl = document.getElementById('progressPct');
  if (fill)  fill.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
}

// ========== CHATBOT ==========

function toggleChatbot() {
  document.getElementById('chatbotPanel').classList.toggle('show');
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg   = input.value.trim();
  if (!msg) return;
  input.value = '';

  addChatMsg(msg, 'user');

  try {
    const data = await callAPI('chatWithBot', {
      group_id:    groupData.group_id,
      section_num: currentSection,
      message:     msg
    });
    addChatMsg(data.reply || 'מצטער, לא הצלחתי להשיב כרגע.', 'bot');
  } catch(e) {
    addChatMsg('שגיאה בחיבור לבוט. נסה שוב.', 'bot');
  }
}

function addChatMsg(text, type) {
  const msgs = document.getElementById('chatMessages');
  const div  = document.createElement('div');
  div.className = 'msg msg-' + type;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ========== קבצים ==========

let filesLoaded = false;

function toggleFiles() {
  const panel = document.getElementById('filesPanel');
  panel.classList.toggle('show');
  if (panel.classList.contains('show') && !filesLoaded) loadFiles();
}

async function loadFiles() {
  const list = document.getElementById('filesList');
  try {
    const files = await callAPI('getGroupFiles', { group_id: groupData.group_id });
    filesLoaded = true;
    renderFiles(files);
  } catch(e) {
    list.innerHTML = '<div style="color:var(--error);font-size:12px;">שגיאה: ' + e.message + '</div>';
  }
}

function renderFiles(files) {
  const list = document.getElementById('filesList');
  if (!files.length) { list.innerHTML = '<div style="color:var(--muted);font-size:12px;">עדיין לא הועלו קבצים</div>'; return; }
  list.innerHTML = files.map(f => `
    <div class="file-item">
      <a href="${f.file_url}" target="_blank" title="${f.file_name}">📄 ${f.file_name}</a>
    </div>
  `).join('');
}

async function uploadSelectedFile() {
  const input  = document.getElementById('fileInput');
  const status = document.getElementById('filesStatus');
  const file   = input.files[0];
  if (!file) { status.textContent = 'בחר קובץ קודם'; status.style.color = 'var(--error)'; return; }

  status.textContent = 'מעלה...'; status.style.color = 'var(--muted)';
  try {
    const base64 = await fileToBase64(file);
    await callAPI('uploadFile', {
      group_id:    groupData.group_id,
      file_name:   file.name,
      mime_type:   file.type,
      base64_data: base64
    });
    status.textContent = '✅ הועלה בהצלחה'; status.style.color = 'var(--success)';
    input.value = '';
    filesLoaded = false;
    await loadFiles();
  } catch(e) {
    status.textContent = 'שגיאה: ' + e.message; status.style.color = 'var(--error)';
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function goBack() { window.location.href = TICHER_URL + 'student.html'; }
</script>
