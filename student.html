<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תיירות דיגיטלית — עבודת הקבוצה</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1E90FF">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="כיתה פלוס">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Secular+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1E90FF; --blue-dark: #0B66C7; --blue-light: #0B66C7;
      --dark: #FFF8ED; --dark2: #FFFFFF; --dark3: #FFEFD9; --dark4: #F4DFB8;
      --text: #1B2A3D; --muted: #6C7A8C; --error: #E5484D;
      --success: #12A66E; --warning: #FF7A3D;
      --teal: #0E9E8F; --purple: #8B5CF6; --purple-light: #6D28D9;
      --gold: #F2A900;
      --font-display: 'Secular One', 'Heebo', sans-serif;
    }
    body {
      font-family: 'Heebo', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh;
      background-image:
        radial-gradient(ellipse 900px 500px at 100% -10%, rgba(30,144,255,0.10), transparent 60%),
        radial-gradient(ellipse 700px 500px at -10% 10%, rgba(255,122,61,0.07), transparent 60%);
      background-attachment: fixed;
    }

    /* TOPBAR */
    .topbar { background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(27,42,61,0.07); padding: 0 20px; height: 62px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .brand-mark { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg, var(--blue), var(--teal)); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 3px 10px rgba(30,144,255,0.35); }
    .brand-mark svg { width: 18px; height: 18px; }
    .topbar-logo { font-family: var(--font-display); font-size: 16px; font-weight: 800; letter-spacing: -0.01em; background: linear-gradient(135deg, var(--blue-light), var(--purple-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .topbar-subject { font-size: 11px; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: 0.06em; background: rgba(14,158,143,0.1); border: 1px solid rgba(14,158,143,0.25); border-radius: 20px; padding: 3px 10px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .btn-sm { padding: 7px 13px; border-radius: 8px; font-family: 'Heebo', sans-serif; font-size: 12px; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-back { background: transparent; border: 1px solid rgba(27,42,61,0.14); color: var(--muted); }
    .btn-back:hover { border-color: rgba(27,42,61,0.3); color: var(--text); }
    .btn-save { background: linear-gradient(135deg, var(--teal), var(--blue)); color: white; font-weight: 700; display: none; box-shadow: 0 2px 10px rgba(14,158,143,0.3); }
    .btn-save.show { display: block; }
    .btn-save:disabled { opacity: 0.6; }

    /* LAYOUT */
    .layout { display: grid; grid-template-columns: 268px 1fr; min-height: calc(100vh - 62px); }

    /* SIDEBAR */
    .sidebar { background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0.4)); border-left: 1px solid rgba(27,42,61,0.07); padding: 20px; display: flex; flex-direction: column; gap: 6px; position: sticky; top: 62px; height: calc(100vh - 62px); overflow-y: auto; }
    .sidebar-title { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; margin-top: 4px; }
    .section-item { position: relative; display: flex; align-items: center; gap: 12px; padding: 9px 12px; border-radius: 12px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
    .section-item:not(:last-child)::after { content: ''; position: absolute; right: 27px; top: 38px; width: 1px; height: 14px; background: repeating-linear-gradient(to bottom, rgba(27,42,61,0.18) 0 3px, transparent 3px 6px); }
    .section-item:hover { background: var(--dark3); }
    .section-item.active { background: rgba(14,158,143,0.1); border-color: rgba(14,158,143,0.35); }
    .section-item.done .section-icon { border-color: var(--gold); background: rgba(242,169,0,0.14); }
    .section-item.locked { opacity: 0.35; pointer-events: none; }
    .section-icon { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; background: var(--dark4); border: 2px solid rgba(27,42,61,0.12); transition: all 0.2s; z-index: 1; }
    .section-item.active .section-icon { border-color: var(--teal); background: rgba(14,158,143,0.18); box-shadow: 0 0 0 3px rgba(14,158,143,0.12); }
    .section-info { flex: 1; }
    .section-num-label { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.04em; }
    .section-name-label { font-family: var(--font-display); font-size: 13px; font-weight: 700; }
    .section-check { font-size: 13px; }

    /* PROGRESS in sidebar */
    .sidebar-progress { margin-bottom: 14px; padding: 14px 16px; background: linear-gradient(135deg, rgba(30,144,255,0.09), rgba(14,158,143,0.06)); border: 1px solid rgba(27,42,61,0.08); border-radius: 14px; }
    .sp-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
    .sp-bar { position: relative; height: 6px; background: var(--dark4); border-radius: 3px; overflow: visible; }
    .sp-fill { position: relative; height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--teal), var(--blue)); transition: width 0.6s cubic-bezier(.4,1.4,.6,1); box-shadow: 0 0 10px rgba(30,144,255,0.5); }
    .sp-fill::after { content: '✈️'; position: absolute; font-size: 12px; top: 50%; left: 0; transform: translate(50%,-50%) rotate(180deg); filter: drop-shadow(0 0 3px rgba(0,0,0,0.6)); }
    .score-badge { margin-bottom: 8px; padding: 10px 12px; background: linear-gradient(135deg, rgba(255,122,61,0.14), rgba(242,169,0,0.08)); border: 1px solid rgba(255,122,61,0.3); border-radius: 12px; font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--gold); text-align: center; }
    .qa-score-pill { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; background: rgba(255,122,61,0.15); color: var(--warning); margin-inline-start: 8px; }
    .qa-feedback { font-size: 12px; color: var(--warning); margin-top: 8px; line-height: 1.5; }
    .qa-feedback:empty { display: none; }

    /* PARTNER ONLINE */
    .partner-status { padding: 10px 12px; background: var(--dark3); border-radius: 10px; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; border: 1px solid rgba(27,42,61,0.05); }
    .partner-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .partner-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .partner-name { font-size: 12px; color: var(--muted); }

    /* SIDE BUTTONS (chatbot / files / backup / lessons) */
    .lessons-btn, .files-btn, .chatbot-btn { display: flex; align-items: center; gap: 10px; padding: 11px 13px; border-radius: 12px; font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; text-align: right; transition: all 0.2s; border: 1px solid; }
    .lessons-btn { background: rgba(30,144,255,0.08); border-color: rgba(30,144,255,0.28); color: var(--blue-light); }
    .lessons-btn:hover { background: rgba(30,144,255,0.16); transform: translateY(-1px); }
    .files-btn { background: rgba(14,158,143,0.08); border-color: rgba(14,158,143,0.28); color: var(--teal); }
    .files-btn:hover { background: rgba(14,158,143,0.16); transform: translateY(-1px); }
    .chatbot-btn { margin-top: auto; background: rgba(139,92,246,0.08); border-color: rgba(139,92,246,0.28); color: var(--purple-light); }
    .chatbot-btn:hover { background: rgba(139,92,246,0.16); transform: translateY(-1px); }

    /* CONTENT */
    .content { padding: 32px; max-width: 820px; background-image: radial-gradient(circle, rgba(27,42,61,0.035) 1px, transparent 1px); background-size: 24px 24px; background-position: -8px -8px; }
    .section-header { margin-bottom: 26px; position: relative; padding-inline-start: 18px; border-inline-start: 3px solid var(--teal); }
    .section-number { font-family: var(--font-display); font-size: 11px; color: var(--teal); font-weight: 700; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.1em; }
    .section-title { font-family: var(--font-display); font-size: 26px; font-weight: 800; margin-bottom: 8px; text-wrap: balance; }
    .section-desc { font-size: 14px; color: var(--muted); line-height: 1.7; }

    /* FIELDS */
    .field-group { margin-bottom: 20px; }
    .field-label { font-size: 13px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .field-required { color: var(--teal); font-size: 11px; }
    .field-textarea { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.6); border: 1px solid rgba(27,42,61,0.09); border-radius: 12px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 14px; outline: none; resize: vertical; min-height: 120px; line-height: 1.6; direction: rtl; transition: all 0.2s; }
    .field-textarea:focus { border-color: rgba(14,158,143,0.5); box-shadow: 0 0 0 3px rgba(14,158,143,0.1); background: rgba(255,255,255,0.9); }
    .field-input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.6); border: 1px solid rgba(27,42,61,0.09); border-radius: 10px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 14px; outline: none; direction: rtl; transition: all 0.2s; }
    .field-input:focus { border-color: rgba(14,158,143,0.5); background: rgba(255,255,255,0.9); }
    .field-hint { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }

    /* SAVE STATUS */
    .save-status { font-size: 12px; color: var(--muted); margin-top: 6px; transition: all 0.3s; }
    .save-status.saving { color: var(--warning); }
    .save-status.saved  { color: var(--success); }

    /* NAVIGATION BUTTONS */
    .nav-btns { display: flex; justify-content: space-between; margin-top: 32px; padding-top: 20px; border-top: 1px dashed rgba(27,42,61,0.12); }
    .btn-nav { padding: 12px 22px; border-radius: 11px; font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-prev { background: var(--dark3); color: var(--muted); }
    .btn-prev:hover { color: var(--text); background: var(--dark4); }
    .btn-next { background: linear-gradient(135deg, var(--teal), var(--blue)); color: white; box-shadow: 0 4px 14px rgba(14,158,143,0.3); }
    .btn-next:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn-next:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* CHATBOT PANEL */
    .chatbot-panel { position: fixed; bottom: 24px; left: 24px; width: 340px; background: var(--dark2); border: 1px solid rgba(139,92,246,0.3); border-radius: 18px; box-shadow: 0 24px 60px rgba(0,0,0,0.55); display: none; flex-direction: column; z-index: 300; }
    .chatbot-panel.show { display: flex; }
    .chatbot-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(27,42,61,0.07); background: linear-gradient(135deg, rgba(139,92,246,0.1), transparent); border-radius: 18px 18px 0 0; }
    .chatbot-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--purple-light); }
    .chatbot-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
    .chatbot-messages { flex: 1; padding: 14px; max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 10px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; max-width: 85%; }
    .msg-bot { background: var(--dark3); align-self: flex-start; }
    .msg-user { background: linear-gradient(135deg, rgba(30,144,255,0.22), rgba(30,144,255,0.12)); align-self: flex-end; }
    .chatbot-input-wrap { display: flex; gap: 8px; padding: 12px; border-top: 1px solid rgba(27,42,61,0.07); }
    .chatbot-input { flex: 1; padding: 9px 12px; background: var(--dark3); border: 1px solid rgba(27,42,61,0.07); border-radius: 9px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 13px; outline: none; direction: rtl; }
    .chatbot-send { padding: 9px 16px; background: linear-gradient(135deg, var(--purple), var(--purple-light)); border: none; border-radius: 9px; color: white; font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }

    /* FILES PANEL */
    .files-panel { position: fixed; bottom: 24px; left: 380px; width: 320px; background: var(--dark2); border: 1px solid rgba(14,158,143,0.3); border-radius: 18px; box-shadow: 0 24px 60px rgba(0,0,0,0.55); display: none; flex-direction: column; z-index: 300; max-height: 420px; }
    .files-panel.show { display: flex; }
    .files-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(27,42,61,0.07); background: linear-gradient(135deg, rgba(14,158,143,0.1), transparent); border-radius: 18px 18px 0 0; }
    .files-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--teal); }
    .files-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
    .files-list { flex: 1; padding: 12px 16px; max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .file-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: var(--dark3); border-radius: 9px; font-size: 12px; }
    .file-item a { color: var(--blue-light); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .files-upload-wrap { padding: 12px 16px; border-top: 1px solid rgba(27,42,61,0.07); }
    .files-upload-wrap input[type=file] { width: 100%; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .files-upload-btn { width: 100%; padding: 10px; background: linear-gradient(135deg, var(--teal), var(--blue)); border: none; border-radius: 9px; color: white; font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
    .files-status { font-size: 11px; color: var(--muted); margin-top: 6px; }

    #backupPanel { left: 712px; }

    @media (max-width: 768px) {
      .files-panel { left: 16px; bottom: 24px; width: calc(100% - 32px); }
      #backupPanel { left: 16px; }
    }

    /* LESSONS BUTTON + MODAL — כרטיס עלייה למטוס (boarding pass) */
    .lessons-overlay { position: fixed; inset: 0; background: rgba(4,10,18,0.8); backdrop-filter: blur(3px); z-index: 400; display: none; align-items: center; justify-content: center; padding: 24px; }
    .lessons-overlay.show { display: flex; }
    .lessons-modal { background: var(--dark2); border: 1px solid rgba(27,42,61,0.1); border-radius: 22px; padding: 0; width: 100%; max-width: 660px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.6); }
    .lessons-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid rgba(27,42,61,0.07); background: linear-gradient(135deg, rgba(30,144,255,0.09), transparent); }
    .lessons-modal-title { font-family: var(--font-display); font-size: 18px; font-weight: 800; }
    .lessons-modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
    .lessons-modal-body { flex: 1; overflow-y: auto; padding: 22px 24px; }

    .lesson-card {
      position: relative;
      background: linear-gradient(160deg, var(--dark3), var(--dark2) 75%);
      border: 1px solid rgba(27,42,61,0.09);
      border-radius: 16px;
      padding: 20px 22px;
      margin-bottom: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .lesson-card::before {
      content: '';
      position: absolute; inset-inline-start: -1px; top: 0; bottom: 0; width: 5px;
      background: linear-gradient(180deg, var(--teal), var(--blue));
      border-radius: 16px 0 0 16px;
    }
    .lesson-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .lesson-num-badge { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--text); background: linear-gradient(135deg, var(--gold), #FF7A3D); border-radius: 20px; padding: 3px 11px; letter-spacing: 0.03em; }
    .lesson-name { font-family: var(--font-display); font-size: 16px; font-weight: 700; }
    .lesson-summary { font-size: 13px; color: var(--text); line-height: 1.7; margin-bottom: 10px; }
    .lesson-assignment { font-size: 12px; color: var(--muted); line-height: 1.6; background: rgba(255,255,255,0.7); border: 1px dashed rgba(27,42,61,0.12); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; }
    .lesson-section-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--teal); background: rgba(14,158,143,0.1); border: 1px solid rgba(14,158,143,0.3); border-radius: 20px; padding: 7px 14px; cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .lesson-section-link:hover { background: rgba(14,158,143,0.2); transform: translateY(-1px); }

    /* LESSON BLOCKS (הוראה / משחק / שאלה אישית) */
    .lesson-block { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px dashed rgba(27,42,61,0.1); }
    .lesson-block:last-child { border-bottom: none; }
    .block-title { font-family: var(--font-display); font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--blue-light); }
    .block-body { font-size: 13px; color: var(--text); line-height: 1.7; white-space: pre-wrap; }
    .lesson-teach-img { width: 100%; border-radius: 12px; margin-bottom: 10px; max-height: 220px; object-fit: cover; }
    .lesson-embed-wrap { position: relative; width: 100%; padding-top: 56.25%; margin-bottom: 10px; border-radius: 12px; overflow: hidden; background: #000; }
    .lesson-embed-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    .lesson-block-question { background: linear-gradient(160deg, rgba(139,92,246,0.08), rgba(139,92,246,0.03)); border: 1px solid rgba(139,92,246,0.25); border-radius: 14px; padding: 16px; }
    .block-question-prompt { font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 10px; }
    .qa-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .qa-status { font-size: 12px; color: var(--muted); }

    .lesson-block-game { background: linear-gradient(160deg, rgba(14,158,143,0.08), rgba(14,158,143,0.03)); border: 1px solid rgba(14,158,143,0.25); border-radius: 14px; padding: 16px; }
    .game-mount { min-height: 40px; }
    .memory-progress, .fc-progress { font-size: 12px; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    .game-reset-btn { background: transparent; border: 1px solid rgba(27,42,61,0.15); color: var(--muted); border-radius: 20px; padding: 4px 11px; font-family: 'Heebo', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.2s; }
    .game-reset-btn:hover { color: var(--text); border-color: rgba(27,42,61,0.35); }
    .memory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
    .memory-tile { background: var(--dark3); border: 1px solid rgba(27,42,61,0.1); border-radius: 10px; padding: 12px 8px; font-size: 11px; text-align: center; cursor: pointer; min-height: 56px; display: flex; align-items: center; justify-content: center; line-height: 1.4; transition: all 0.15s; }
    .memory-tile.open { background: rgba(30,144,255,0.16); border-color: rgba(30,144,255,0.45); }
    .memory-tile.matched { background: rgba(18,166,110,0.16); border-color: rgba(18,166,110,0.45); opacity: 0.75; cursor: default; }
    .memory-win { text-align: center; margin-top: 12px; font-size: 13px; font-weight: 700; color: var(--success); }

    .fc-card { position: relative; background: var(--dark3); border: 1px solid rgba(27,42,61,0.1); border-radius: 14px; padding: 24px 16px; min-height: 90px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; }
    .fc-card::after { content: '🔄'; position: absolute; top: 8px; left: 10px; font-size: 11px; opacity: 0.4; }
    .fc-face { display: none; line-height: 1.5; }
    .fc-card:not(.flipped) .fc-front { display: block; }
    .fc-card.flipped .fc-back { display: block; color: var(--teal); }
    .fc-hint { text-align: center; font-size: 11px; color: var(--muted); margin-top: 6px; }
    .fc-controls { display: flex; justify-content: space-between; margin-top: 10px; }

    /* עריכות והערות מורה על סעיפי הפרויקט */

    .lesson-answers-panel { margin: 20px 0; padding: 18px; background: linear-gradient(160deg, rgba(30,144,255,0.07), rgba(30,144,255,0.02)); border: 1px solid rgba(30,144,255,0.22); border-radius: 14px; }

    /* מצב מצגת (גם לתלמידים — לפי בקשת ניסן) */

    @media (max-width: 768px) {

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;

    button, .btn-sm, .btn-nav, .btn-back, .btn-save, .btn-next, .btn-prev,

    button:not(:disabled):active, .btn-sm:active, .btn-nav:not(:disabled):active, .btn-back:active,
    .lessons-btn:active, .files-btn:active, .chatbot-btn:active, .game-reset-btn:active,
    .lessons-modal-close:active, .files-close:active, .chatbot-close:active,

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function(){});
}
const TICHER_URL  = 'https://nisan1234-afk.github.io/TICHER/';
const API_URL     = 'https://script.google.com/macros/s/AKfycbwf3-MNZBBi64zXcNH7wfhBRoEBl9brtQ9QRI4Won5RmUIOrl_WBivN6uI5NAp6Mc0h/exec';
// מפתח Gemini API נשמר בשרת (Apps Script Script Properties) — לא כאן, כדי שלא ייחשף לציבור ב-GitHub Pages

const SECTIONS = [
  { num:1, name:'פרטי האתר',          icon:'📍', desc:'תאר את אתר התיירות שבחרתם — מיקום, סוג, קהל יעד, מה מיוחד בו.',
    fields:[{id:'site_basic',label:'פרטי האתר הבסיסיים',hint:'שם, מיקום, סוג אתר תיירות',type:'textarea'},
            {id:'site_target',label:'קהל יעד',hint:'מי מגיע לאתר? גיל, מוצא, עניין',type:'textarea'},
            {id:'site_unique',label:'מה מיוחד באתר?',hint:'מה מבדיל אותו ממתחרים?',type:'textarea'}] },
  { num:2, name:'תיאור כללי',          icon:'📄', desc:'תאר את האתר באופן כללי — היסטוריה, חשיבות, מה הוא מציע למבקרים.',
    fields:[{id:'general_history',label:'היסטוריה ורקע',hint:'מתי הוקם? כיצד התפתח?',type:'textarea'},
            {id:'general_offer',label:'מה האתר מציע?',hint:'אטרקציות, שירותים, חוויות',type:'textarea'}] },
  { num:3, name:'נוכחות דיגיטלית',     icon:'📱', desc:'נתח את הנוכחות הדיגיטלית של האתר — אתר אינטרנט, רשתות חברתיות, ביקורות.',
    fields:[{id:'digital_website',label:'אתר האינטרנט',hint:'קיים? עדכני? נגיש למובייל?',type:'textarea'},
            {id:'digital_social',label:'רשתות חברתיות',hint:'אינסטגרם, פייסבוק, טיקטוק — ניתוח קצר',type:'textarea'},
            {id:'digital_reviews',label:'ביקורות ודירוגים',hint:'גוגל, טריפאדוויזור — ממוצע ותוכן',type:'textarea'}] },
  { num:4, name:'מושגים',              icon:'📚', desc:'קשר בין מושגים שלמדת לבין האתר שבחרת.',
    fields:[{id:'concepts_list',label:'מושגים רלוונטיים',hint:'לדוגמה: כלכלה שיתופית, ביג דאטה, SEO...',type:'textarea'},
            {id:'concepts_apply',label:'כיצד מושגים אלו קשורים לאתר?',hint:'הסבר לכל מושג כיצד הוא בא לידי ביטוי',type:'textarea'}] },
  { num:5, name:'חוויית משתמש',        icon:'🖥️', desc:'נתח את חוויית המשתמש הדיגיטלית — קלות שימוש, עיצוב, נגישות.',
    fields:[{id:'ux_ease',label:'קלות שימוש',hint:'האם קל למצוא מידע? ניווט ברור?',type:'textarea'},
            {id:'ux_design',label:'עיצוב ויזואלי',hint:'צבעים, תמונות, פונטים — רושם כללי',type:'textarea'},
            {id:'ux_mobile',label:'גרסה מובייל',hint:'האם האתר מותאם לטלפון?',type:'textarea'}] },
  { num:6, name:'עוצמות',              icon:'💪', desc:'מה האתר עושה טוב בתחום הדיגיטלי? אילו נקודות חוזקה בולטות?',
    fields:[{id:'strengths_main',label:'עוצמות דיגיטליות',hint:'לפחות 3 נקודות חוזקה מנומקות',type:'textarea'},
            {id:'strengths_example',label:'דוגמה בולטת',hint:'הצג דוגמה ספציפית לנוכחות דיגיטלית מוצלחת',type:'textarea'}] },
  { num:7, name:'הצעות לשיפור',        icon:'💡', desc:'הציעו שיפורים דיגיטליים ממשיים לאתר — חשבו כמו יועצי דיגיטל.',
    fields:[{id:'improve_ideas',label:'הצעות לשיפור',hint:'לפחות 3 הצעות ממשיות ומנומקות',type:'textarea'},
            {id:'improve_priority',label:'הצעה מועדפת',hint:'איזו הצעה הכי חשובה? למה?',type:'textarea'},
            {id:'improve_how',label:'כיצד תיישמו אותה?',hint:'תיאור צעדים מעשיים',type:'textarea'}] },
  { num:8, name:'סיכום אישי',          icon:'✍️', desc:'כתב סיכום אישי — מה למדת, מה הפתיע אותך, מה תקח איתך.',
    fields:[{id:'personal_learned',label:'מה למדתי',hint:'3 דברים שלמדת מהפרויקט',type:'textarea'},
            {id:'personal_surprise',label:'מה הפתיע אותי',hint:'גילוי מעניין שלא ציפית אליו',type:'textarea'},
            {id:'personal_takeaway',label:'מה אני לוקח/ת איתי',hint:'כיצד זה ישפיע על הסתכלותך על אתרי תיירות?',type:'textarea'}] }
];

let currentUser   = null;
let groupData     = null;
let currentSection = 1;
let sectionContent = {};
let saveTimer      = null;
let hasChanges     = false;
let allLessons     = [];
const gameStates   = {};
let teacherEdits    = {};
let sectionComments = {};

window.onload = async function() {
  const stored = sessionStorage.getItem('kitahUser');
  if (!stored) { window.location.href = TICHER_URL; return; }
  currentUser = JSON.parse(stored);

  const startSection = parseInt(sessionStorage.getItem('currentSection')) || 1;
  await loadGroupData();
  navigateTo(startSection);
};

async function callAPI(action, params = {}) {
  const res  = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, token: currentUser.token, ...params }) });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error);
  return data.data;
}

async function loadGroupData() {
  try {
    const dashData = await callAPI('getTeacherDashboard');
    const groups   = dashData.groups || [];
    const email    = currentUser.email;
    const myGroup  = groups.find(g => (g.members || []).some(m => m.toLowerCase() === email.toLowerCase()));
    if (!myGroup) throw new Error('לא שויכת לקבוצה');

    const detail = await callAPI('getGroupData', { group_id: myGroup.group_id });
    groupData = { ...myGroup, ...detail.group };
    sectionContent   = detail.sections || {};
    teacherEdits     = detail.teacherEdits || {};
    sectionComments  = detail.comments || {};
    updateScoreBadge(detail.total_score || 0);

    // טוען גם את היחידות מראש (לא רק כשפותחים את "השיעורים שלי") — כדי שתשובות
    // לשאלות אישיות מיחידות יוכלו להופיע ישירות בתוך עמוד הסעיף הרלוונטי
    try {
      const lessonsData = await callAPI('getGroupLessons', { group_id: myGroup.group_id });
      allLessons = lessonsData.lessons || [];
    } catch (e) { allLessons = []; }

    // חברי הקבוצה מלבדי
    const others = (groupData.members || []).filter(m => m.toLowerCase() !== email.toLowerCase());
    document.getElementById('partnerLabel').textContent = others.length
      ? 'חברי הקבוצה: ' + others.map(m => m.split('@')[0]).join(', ')
      : 'עובד/ת לבד בקבוצה זו';

    renderSectionNav();
    updateProgress();
  } catch(e) {
    document.getElementById('sectionContent').innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);">שגיאה: ' + e.message + '</div>';
  }
}

function renderSectionNav() {
  const nav = document.getElementById('sectionNav');
  nav.innerHTML = SECTIONS.map(s => {
    const isDone    = sectionContent['section_'+s.num] ? true : false;
    const isCurrent = s.num === currentSection;
    const isLocked  = false; // נעילת סעיפים כבויה לפי בקשת המורה — כל הסעיפים פתוחים תמיד
    const cls = isLocked ? 'locked' : isDone ? 'done' : '';
    const active = isCurrent ? 'active' : '';
    const check = isDone ? '✅' : isLocked ? '🔒' : '';

    return `<div class="section-item ${cls} ${active}" onclick="navigateTo(${s.num})">
      <div class="section-icon">${s.icon}</div>
      <div class="section-info">
        <div class="section-num-label">סעיף ${s.num}</div>
        <div class="section-name-label">${s.name}</div>
      </div>
      <div class="section-check">${check}</div>
    </div>`;
  }).join('');
}

function navigateTo(num) {
  if (hasChanges) { saveSection(); }
  currentSection = num;
  sessionStorage.setItem('currentSection', num);

  const sec = SECTIONS[num - 1];
  const saved = sectionContent['section_'+num] || '';
  let savedData = {};
  try { savedData = JSON.parse(saved); } catch(e) { savedData = {}; }

  const fieldTeacherEdits = teacherEdits['section_' + num] || {};

  const fieldsHTML = sec.fields.map(f => {
    const teacherNote = fieldTeacherEdits[f.id]
      ? `<div class="teacher-edit-note">✏️ עריכת המורה לשדה זה: <div class="teacher-edit-text">${escapeHtml(fieldTeacherEdits[f.id])}</div></div>`
      : '';
    return `
    <div class="field-group">
      <div class="field-label">${f.label} <span class="field-required">*</span></div>
      ${f.type === 'textarea'
        ? `<textarea class="field-textarea" id="field_${f.id}" rows="5" oninput="onFieldChange()" placeholder="${f.hint||''}">${savedData[f.id]||''}</textarea>`
        : `<input class="field-input" id="field_${f.id}" type="text" oninput="onFieldChange()" placeholder="${f.hint||''}" value="${savedData[f.id]||''}" />`
      }
      ${f.hint ? `<div class="field-hint">💡 ${f.hint}</div>` : ''}
      ${teacherNote}
    </div>
  `;
  }).join('');

  const sectionComment = sectionComments['section_' + num];
  const commentHTML = sectionComment
    ? `<div class="teacher-comment-box"><div class="teacher-comment-label">💬 הערת המורה לסעיף זה</div><div class="teacher-comment-text">${escapeHtml(sectionComment)}</div></div>`
    : '';

  const isLocked = false; // נעילת סעיפים כבויה לפי בקשת המורה — כל הסעיפים פתוחים תמיד

  const siteHTML = num === 1 ? `
    <div class="field-group" style="padding:16px;background:var(--dark2);border:1px solid rgba(27,42,61,0.08);border-radius:12px;">
      <div class="field-label">🗺️ האתר שבחרתם</div>
      <input class="field-input" id="siteNameInput" type="text" placeholder="שם אתר התיירות" value="${groupData.site_name || ''}" style="margin-bottom:8px;" />
      <input class="field-input" id="siteUrlInput" type="text" placeholder="קישור לאתר/עמוד (אופציונלי)" value="${groupData.site_url || ''}" />
      <button class="btn-nav btn-next" style="margin-top:10px;" onclick="proposeSite()">בדוק והגדר אתר</button>
      <div id="siteFeedback" style="margin-top:10px;font-size:13px;color:var(--muted);"></div>
    </div>
  ` : '';

  const lessonAnswersHTML = renderLessonAnswersPanel(num);

  document.getElementById('sectionContent').innerHTML = `
    <div class="section-header">
      <div class="section-number">סעיף ${num} מתוך 8</div>
      <div class="section-title">${sec.icon} ${sec.name}</div>
      <div class="section-desc">${sec.desc}</div>
    </div>
    ${siteHTML}
    ${commentHTML}
    ${lessonAnswersHTML}
    ${isLocked ? '<div style="padding:20px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:12px;color:var(--error);font-size:14px;">🔒 סעיף זה נעול עדיין — המורה יפתח אותו בזמן המתאים.</div>' : fieldsHTML}
    ${!isLocked ? `
    <div class="nav-btns">
      <button class="btn-nav btn-prev" onclick="navigateTo(${num-1})" ${num===1?'style="visibility:hidden"':''}>→ הקודם</button>
      <div>
        <span class="save-status" id="saveStatus">שינויים לא נשמרו</span>
      </div>
      <button class="btn-nav btn-next" onclick="saveAndNext()" ${num===8?'disabled':''}>הבא ←</button>
    </div>` : ''}
  `;

  document.getElementById('saveBtn').classList.toggle('show', !isLocked);
  hasChanges = false;
  renderSectionNav();
}

/**
 * מציג בתוך עמוד הסעיף את השאלות האישיות מהיחידות שמפנות אליו (target_field
 * ששייך לאחד משדות הסעיף הזה) — כדי שהיחידות באמת יזינו את התוצר הסופי,
 * לא רק "ילמדו בצד". נשמר בנפרד מהשדות החופשיים, לא נדרס אוטומטית.
 */
function renderLessonAnswersPanel(sectionNum) {
  const sec = SECTIONS[sectionNum - 1];
  const fieldIds = sec.fields.map(f => f.id);
  const items = [];
  allLessons.forEach(l => (l.blocks || []).forEach(b => {
    if (b.block_type === 'question' && fieldIds.includes(b.target_field)) {
      items.push({ unit_id: l.unit_id, unit_name: l.unit_name, block: b, glossary: getGlossaryForLesson(l) });
    }
  }));
  if (!items.length) return '';

  return `
    <div class="lesson-answers-panel">
      <div class="lap-title">📚 מהיחידות שלכם — תשובות שיכולות לעזור לסעיף הזה</div>
      ${items.map(item => `
        <div class="lap-item">
          <div class="lap-source">מיחידה: ${escapeHtml(item.unit_name)}</div>
          <div class="lap-question">${glossarize(item.block.question_prompt, item.glossary)}</div>
          <textarea class="field-textarea" id="qa_sec_${item.block.block_id}" rows="3" placeholder="כתבו כאן את התשובה שלכם...">${escapeHtml(item.block.saved_answer || '')}</textarea>
          <div class="qa-row">
            <button class="btn-nav btn-next" onclick="saveQASection('${item.unit_id}','${item.block.block_id}')">💾 שמור תשובה</button>
            <span class="qa-status" id="qa_sec_status_${item.block.block_id}"></span>
          </div>
        </div>
      `).join('')}
    </div>`;
}

async function proposeSite() {
  const name = document.getElementById('siteNameInput').value.trim();
  const url  = document.getElementById('siteUrlInput').value.trim();
  const fb   = document.getElementById('siteFeedback');
  if (!name) { fb.textContent = 'נא להכניס שם אתר'; fb.style.color = 'var(--error)'; return; }

  fb.textContent = 'בודק...'; fb.style.color = 'var(--muted)';
  try {
    const data = await callAPI('proposeSite', { group_id: groupData.group_id, site_name: name, site_url: url });
    groupData.site_name = data.site_name;
    groupData.site_url  = data.site_url;
    fb.textContent = data.feedback; fb.style.color = 'var(--teal)';
  } catch(e) {
    fb.textContent = 'שגיאה: ' + e.message; fb.style.color = 'var(--error)';
  }
}

function onFieldChange() {
  hasChanges = true;
  const status = document.getElementById('saveStatus');
  if (status) { status.textContent = 'שינויים לא נשמרו'; status.className = 'save-status'; }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveSection(true), 3000); // שמירה אוטומטית אחרי 3 שניות
}

async function saveSection(auto = false) {
  if (!groupData) return;
  const sec = SECTIONS[currentSection - 1];
  const wasDone = !!sectionContent['section_' + currentSection];
  const data = {};
  sec.fields.forEach(f => {
    const el = document.getElementById('field_' + f.id);
    if (el) data[f.id] = el.value;
  });

  const status = document.getElementById('saveStatus');
  if (status) { status.textContent = 'שומר...'; status.className = 'save-status saving'; }

  try {
    await callAPI('saveSection', {
      group_id:     groupData.group_id,
      section_num:  currentSection,
      content:      JSON.stringify(data),
      device_id:    navigator.userAgent.slice(0,50)
    });
    sectionContent['section_'+currentSection] = JSON.stringify(data);
    hasChanges = false;
    if (status) { status.textContent = auto ? 'נשמר אוטומטית ✓' : 'נשמר ✓'; status.className = 'save-status saved'; }
    updateProgress();
    renderSectionNav();
    if (!wasDone && sectionContent['section_' + currentSection]) stampSectionComplete(currentSection);
  } catch(e) {
    if (status) { status.textContent = 'שגיאה בשמירה'; status.className = 'save-status'; }
  }
}

/** רגע חתימה חד-פעמי: "חותמת דרכון" על הסעיף בסיידבר בפעם הראשונה שהוא מושלם. */
function stampSectionComplete(num) {
  requestAnimationFrame(() => {
    const items = document.querySelectorAll('.section-item');
    const icon = items[num - 1] && items[num - 1].querySelector('.section-icon');
    if (!icon) return;
    icon.classList.remove('stamp-pop');
    void icon.offsetWidth; // מאתחל את האנימציה אם היא כבר רצה פעם קודם
    icon.classList.add('stamp-pop');
  });
}

async function saveAndNext() {
  await saveSection();
  if (currentSection < 8) navigateTo(currentSection + 1);
}

function updateScoreBadge(total) {
  const badge = document.getElementById('scoreBadge');
  const val   = document.getElementById('scoreValue');
  if (total > 0) { val.textContent = total; badge.style.display = 'block'; }
  else { badge.style.display = 'none'; }
}

function updateProgress() {
  const done = Object.keys(sectionContent).filter(k => k.startsWith('section_') && sectionContent[k]).length;
  const pct  = Math.round((done / 8) * 100);
  const fill = document.getElementById('progressFill');
  const pctEl = document.getElementById('progressPct');
  if (fill)  fill.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function escapeHtml(str) {
  return String(str == null ? '' : str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function gameDataPairs(gameData) {
  if (!gameData) return [];
  return Array.isArray(gameData) ? gameData : (gameData.pairs || []);
}

/** מוצא את זוגות מושג/הסבר של יחידה (מבלוק המשחק שלה, אם יש) — משמש כמילון לטולטיפים. */
function getGlossaryForLesson(lesson) {
  const gameBlock = (lesson.blocks || []).find(b => b.block_type === 'game' && gameDataPairs(b.game_data).length);
  return gameBlock ? gameDataPairs(gameBlock.game_data) : [];
}

/**
 * עוטף מושגים מקצועיים בטקסט בסימן קטן (ⓘ) שמציג הסבר קצר במעבר עכבר —
 * לפי בקשת ניסן: "ליד מילה מקצועית סימן קטן, ובמעבר עכבר עולה הסבר קצר".
 * עובד על טקסט שכבר "אחרי escape", כדי לא לפתוח פרצת HTML מתוך תוכן חופשי.
 */
function glossarize(text, pairs) {
  const escaped = escapeHtml(text);
  const terms = (pairs || []).filter(p => p.term);
  if (!terms.length) return escaped;

  const sorted  = terms.slice().sort((a, b) => b.term.length - a.term.length);
  const pattern = new RegExp(sorted.map(p => escapeRegex(escapeHtml(p.term))).join('|'), 'g');
  const used = new Set();

  return escaped.replace(pattern, (match) => {
    const pair = sorted.find(p => escapeHtml(p.term) === match);
    if (!pair || used.has(pair.term)) return match;
    used.add(pair.term);
    return `<span class="gloss-wrap">${match}<span class="gloss-icon" tabindex="0">ⓘ<span class="gloss-tip">${escapeHtml(pair.definition || '')}</span></span></span>`;
  });
}

function renderLessons(lessons) {
  const body = document.getElementById('lessonsBody');
  if (!lessons.length) {
    body.innerHTML = '<div style="text-align:center;color:var(--muted);padding:30px;">המורה עוד לא הוסיף שיעורים. תבדקו שוב בקרוב.</div>';
    return;
  }
  body.innerHTML = lessons.map(l => {
    const numBadge = l.lesson_num ? `<span class="lesson-num-badge">יחידה ${l.lesson_num}</span>` : '';
    const sectionNum = parseInt(l.section_linked);
    const sec = SECTIONS[sectionNum - 1];
    const sectionLink = sec
      ? `<span class="lesson-section-link" onclick="jumpToSectionFromLesson(${sectionNum})">${sec.icon||''} עבור לסעיף ${sectionNum} — ${sec.name||''}</span>`
      : '';
    const presentBtn = (l.blocks && l.blocks.length)
      ? `<span class="lesson-section-link" onclick="openLessonPresentation('${l.unit_id}')" style="color:var(--purple-light);border-color:rgba(139,92,246,0.3);background:rgba(139,92,246,0.1);">🎬 הצג כמצגת</span>`
      : '';
    return `<div class="lesson-card">
      <div class="lesson-card-header">${numBadge}<span class="lesson-name">${escapeHtml(l.unit_name)}</span></div>
      ${renderLessonBlocks(l)}
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">${sectionLink}${presentBtn}</div>
    </div>`;
  }).join('');

  // מציירים משחקים אחרי שהם כבר בתוך ה-DOM (הם צריכים אלמנט קיים כדי לצייר לתוכו)
  lessons.forEach(l => (l.blocks || []).forEach(b => {
    if (b.block_type === 'game') {
      if (!gameStates[b.block_id]) gameStates[b.block_id] = b.game_type === 'memory' ? initMemoryState(b) : initFlashState(b);
      paintGame(b.block_id, b.game_type);
    }
  }));
}

/** בונה HTML לכל הבלוקים של יחידה — נופל חזרה לתצוגה הישנה אם ליחידה אין בלוקים כלל. */
function renderLessonBlocks(lesson) {
  const glossary = getGlossaryForLesson(lesson);
  if (!lesson.blocks || !lesson.blocks.length) {
    const imageHtml = lesson.image_url ? `<img class="lesson-teach-img" src="${lesson.image_url}" />` : '';
    const embedHtml = lesson.embed_url ? `<div class="lesson-embed-wrap"><iframe src="${lesson.embed_url}" allowfullscreen></iframe></div>` : '';
    return `${imageHtml}${embedHtml}
      ${lesson.summary ? `<div class="lesson-summary">${glossarize(lesson.summary, glossary)}</div>` : ''}
      ${lesson.assignment_summary ? `<div class="lesson-assignment">📝 ${glossarize(lesson.assignment_summary, glossary)}</div>` : ''}`;
  }
  return lesson.blocks.map(b => {
    if (b.block_type === 'teach')               return renderTeachBlock(b, glossary);
    if (b.block_type === 'game')                return renderGameBlockShell(b);
    if (b.block_type === 'question')            return renderQuestionBlock(lesson.unit_id, b, glossary);
    if (b.block_type === 'quiz')                return renderQuizBlock(b, glossary);
    if (b.block_type === 'question_structured') return renderStructuredQuestionBlock(lesson.unit_id, b, glossary);
    return '';
  }).join('');
}

function findBlockById(blockId) {
  for (const l of allLessons) {
    const found = (l.blocks || []).find(b => b.block_id === blockId);
    if (found) return found;
  }
  return null;
}

function renderTeachBlock(block, glossary) {
  const media = block.media_type === 'video' && block.media_url
    ? `<div class="lesson-embed-wrap"><iframe src="${block.media_url}" allowfullscreen></iframe></div>`
    : (block.media_type === 'image' && block.media_url ? `<img class="lesson-teach-img" src="${block.media_url}" />` : '');
  return `
    <div class="lesson-block lesson-block-teach">
      ${block.title ? `<div class="block-title">📖 ${escapeHtml(block.title)}</div>` : ''}
      ${media}
      ${block.body ? `<div class="block-body">${glossarize(block.body, glossary)}</div>` : ''}
    </div>`;
}

function renderQuestionBlock(unitId, block, glossary) {
  const scorePill = (block.saved_score !== null && block.saved_score !== undefined)
    ? `<span class="qa-score-pill" id="qa_score_${block.block_id}">⭐ ${block.saved_score}/10</span>` : `<span id="qa_score_${block.block_id}"></span>`;
  const feedback = block.saved_feedback
    ? `<div class="qa-feedback" id="qa_feedback_${block.block_id}">${escapeHtml(block.saved_feedback)}</div>` : `<div class="qa-feedback" id="qa_feedback_${block.block_id}"></div>`;
  return `
    <div class="lesson-block lesson-block-question">
      <div class="block-title">🎯 ${escapeHtml(block.title || 'שאלה אישית')}${scorePill}</div>
      <div class="block-question-prompt">${glossarize(block.question_prompt, glossary)}</div>
      <textarea class="field-textarea" id="qa_${block.block_id}" rows="3" placeholder="כתבו כאן את התשובה שלכם...">${escapeHtml(block.saved_answer || '')}</textarea>
      <div class="qa-row">
        <button class="btn-nav btn-next" onclick="saveQABlock('${unitId}','${block.block_id}')">💾 שמור תשובה</button>
        <span class="qa-status" id="qa_status_${block.block_id}"></span>
      </div>
      ${feedback}
    </div>`;
}

const quizConfig = {};

function renderQuizBlock(block, glossary) {
  const q = block.game_data || {};
  quizConfig[block.block_id] = q;
  const options = (q.options || []).map((opt, i) => `
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;">
      <input type="checkbox" class="quiz-opt" data-block="${block.block_id}" data-idx="${i}" />
      <span>${escapeHtml(opt)}</span>
    </label>`).join('');
  return `
    <div class="lesson-block lesson-block-question">
      <div class="block-title">✅ ${escapeHtml(block.title || 'בדיקת הבנה קצרה')}</div>
      <div class="block-question-prompt">${glossarize(block.question_prompt, glossary)}</div>
      <div class="quiz-options">${options}</div>
      <div class="qa-row">
        <button class="btn-nav btn-next" onclick="checkQuizAnswer('${block.block_id}')">בדוק תשובה</button>
      </div>
      <div class="qa-feedback" id="quiz_feedback_${block.block_id}"></div>
    </div>`;
}

function checkQuizAnswer(blockId) {
  const q = quizConfig[blockId] || {};
  const correct = (q.correct || []).slice().sort();
  const checked = [...document.querySelectorAll('.quiz-opt[data-block="' + blockId + '"]:checked')]
    .map(el => parseInt(el.dataset.idx, 10)).sort();
  const isMatch = correct.length === checked.length && correct.every((v, i) => v === checked[i]);
  const feedbackEl = document.getElementById('quiz_feedback_' + blockId);
  if (feedbackEl) {
    feedbackEl.textContent = isMatch ? (q.feedbackCorrect || '✓ נכון!') : (q.feedbackIncorrect || 'כמעט. נסו שוב.');
    feedbackEl.style.color = isMatch ? 'var(--success)' : 'var(--warning)';
  }
}

function renderStructuredQuestionBlock(unitId, block, glossary) {
  const sq = block.game_data || {};
  const scorePill = (block.saved_score !== null && block.saved_score !== undefined)
    ? `<span class="qa-score-pill" id="qa_score_${block.block_id}">⭐ ${block.saved_score}/10</span>` : `<span id="qa_score_${block.block_id}"></span>`;
  const feedback = block.saved_feedback
    ? `<div class="qa-feedback" id="qa_feedback_${block.block_id}">${escapeHtml(block.saved_feedback)}</div>` : `<div class="qa-feedback" id="qa_feedback_${block.block_id}"></div>`;

  const categories = (sq.categories || []).map((cat, i) => `
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;">
      <input type="checkbox" class="sq-cat" data-block="${block.block_id}" data-idx="${i}" />
      <span>${escapeHtml(cat)}</span>
    </label>`).join('');

  const explainRows = (sq.explainParts || []).map((label, i) => `
    <div class="field-group">
      <div class="field-label">${escapeHtml(label)}</div>
      <input type="text" class="field-input" id="sq_explain_${block.block_id}_${i}" />
    </div>`).join('');

  const checklist = (sq.checklist || []).length
    ? `<div class="field-hint">לפני שמירה, ודאו:<br>${sq.checklist.map(c => '☐ ' + escapeHtml(c)).join('<br>')}</div>` : '';

  return `
    <div class="lesson-block lesson-block-question">
      <div class="block-title">📝 ${escapeHtml(block.title || 'שאלה אישית')}${scorePill}</div>
      <div class="block-question-prompt">${glossarize(block.question_prompt, glossary)}</div>
      ${categories ? `<div class="field-group"><div class="field-label">סמנו קטגוריות רלוונטיות:</div>${categories}</div>` : ''}
      ${sq.fillPrompt ? `<div class="field-group"><div class="field-label">${escapeHtml(sq.fillPrompt)}</div><input type="text" class="field-input" id="sq_fill_${block.block_id}" /></div>` : ''}
      ${sq.evidenceLabel ? `<div class="field-group"><div class="field-label">${escapeHtml(sq.evidenceLabel)}</div><input type="text" class="field-input" id="sq_evidence_${block.block_id}" /></div>` : ''}
      ${explainRows}
      ${checklist}
      ${block.saved_answer ? `<div class="field-hint">התשובה השמורה שלכם:<br>${escapeHtml(block.saved_answer).replace(/\n/g,'<br>')}</div>` : ''}
      <div class="qa-row">
        <button class="btn-nav btn-next" onclick="saveSQBlock('${unitId}','${block.block_id}')">💾 שמור תשובה</button>
        <span class="qa-status" id="qa_status_${block.block_id}"></span>
      </div>
      ${feedback}
    </div>`;
}

function saveSQBlock(unitId, blockId) {
  const block = findBlockById(blockId);
  if (!block) return;
  const sq = block.game_data || {};
  const catBoxes = [...document.querySelectorAll('.sq-cat[data-block="' + blockId + '"]:checked')]
    .map(el => (sq.categories || [])[parseInt(el.dataset.idx, 10)]).filter(Boolean);
  const fillEl = document.getElementById('sq_fill_' + blockId);
  const evidenceEl = document.getElementById('sq_evidence_' + blockId);

  const lines = [];
  if (catBoxes.length) lines.push('קטגוריות שנבחרו: ' + catBoxes.join(', '));
  if (fillEl && fillEl.value.trim()) lines.push((sq.fillPrompt || 'השלמה:') + ' ' + fillEl.value.trim());
  if (evidenceEl && evidenceEl.value.trim()) lines.push((sq.evidenceLabel || 'הוכחה:') + ' ' + evidenceEl.value.trim());
  (sq.explainParts || []).forEach((label, i) => {
    const el = document.getElementById('sq_explain_' + blockId + '_' + i);
    if (el && el.value.trim()) lines.push(label + ' ' + el.value.trim());
  });

  const status = document.getElementById('qa_status_' + blockId);
  if (!lines.length) { if (status) { status.textContent = 'נא למלא לפחות שדה אחד'; status.style.color = 'var(--warning)'; } return; }
  saveLessonAnswerCore(unitId, blockId, lines.join('\n'), status);
}

function renderGameBlockShell(block) {
  return `
    <div class="lesson-block lesson-block-game">
      ${block.title ? `<div class="block-title">🎮 ${escapeHtml(block.title)}</div>` : ''}
      <div class="game-mount" id="game_${block.block_id}"></div>
    </div>`;
}

function paintGame(blockId, gameType) {
  if (gameType === 'memory') paintMemory(blockId); else paintFlash(blockId);
}

// ---- משחק זיכרון ----

function buildMemoryTiles(pairs) {
  const tiles = [];
  pairs.forEach((p, i) => {
    tiles.push({ pairIdx: i, side: 'term', text: p.term });
    tiles.push({ pairIdx: i, side: 'definition', text: p.definition });
  });
  for (let i = tiles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }
  return tiles;
}

function initMemoryState(block) {
  const pairs = gameDataPairs(block.game_data);
  const meta  = Array.isArray(block.game_data) ? {} : (block.game_data || {});
  return {
    pairs, tiles: buildMemoryTiles(pairs), matched: new Array(pairs.length * 2).fill(false), openIdx: [], busy: false,
    feedbackCorrect: meta.feedbackCorrect || '', feedbackIncorrect: meta.feedbackIncorrect || '', lastFeedback: ''
  };
}

function resetMemoryGame(blockId) {
  const st = gameStates[blockId];
  if (!st) return;
  st.tiles = buildMemoryTiles(st.pairs);
  st.matched = new Array(st.tiles.length).fill(false);
  st.openIdx = [];
  st.busy = false;
  paintMemory(blockId);
}

function paintMemory(blockId) {
  const st = gameStates[blockId];
  const mount = document.getElementById('game_' + blockId);
  if (!st || !mount) return;
  const solvedPairs = st.matched.filter(Boolean).length / 2;
  const totalPairs  = st.tiles.length / 2;
  mount.innerHTML = `
    <div class="memory-progress">
      <span>${solvedPairs} / ${totalPairs} זוגות נמצאו</span>
      <button class="game-reset-btn" onclick="resetMemoryGame('${blockId}')">🔄 התחל מחדש</button>
    </div>
    <div class="memory-grid">
      ${st.tiles.map((t, i) => {
        const isOpen = st.matched[i] || st.openIdx.includes(i);
        return `<div class="memory-tile ${isOpen ? 'open' : ''} ${st.matched[i] ? 'matched' : ''}" onclick="clickMemoryTile('${blockId}',${i})">${isOpen ? escapeHtml(t.text) : '?'}</div>`;
      }).join('')}
    </div>
    ${solvedPairs === totalPairs && totalPairs > 0 ? '<div class="memory-win">🎉 מצאתם את כל הזוגות!</div>' : ''}
    ${st.lastFeedback ? `<div class="qa-feedback">${escapeHtml(st.lastFeedback)}</div>` : ''}
  `;
}

function clickMemoryTile(blockId, i) {
  const st = gameStates[blockId];
  if (!st || st.busy || st.matched[i] || st.openIdx.includes(i)) return;
  st.openIdx.push(i);
  if (st.openIdx.length === 2) {
    st.busy = true;
    paintMemory(blockId);
    const [a, b] = st.openIdx;
    const isMatch = st.tiles[a].pairIdx === st.tiles[b].pairIdx && st.tiles[a].side !== st.tiles[b].side;
    st.lastFeedback = isMatch ? st.feedbackCorrect : st.feedbackIncorrect;
    setTimeout(() => {
      if (isMatch) { st.matched[a] = true; st.matched[b] = true; }
      st.openIdx = [];
      st.busy = false;
      paintMemory(blockId);
    }, isMatch ? 500 : 1000);
  } else {
    paintMemory(blockId);
  }
}

// ---- כרטיסיות (flashcards) ----

function initFlashState(block) {
  return { pairs: gameDataPairs(block.game_data), idx: 0, flipped: false };
}

function paintFlash(blockId) {
  const st = gameStates[blockId];
  const mount = document.getElementById('game_' + blockId);
  if (!st || !mount) return;
  const p = st.pairs[st.idx] || { term: '', definition: '' };
  mount.innerHTML = `
    <div class="fc-progress">
      <span>${st.pairs.length ? st.idx + 1 : 0} / ${st.pairs.length}</span>
      <button class="game-reset-btn" onclick="resetFlashGame('${blockId}')">🔄 התחל מחדש</button>
    </div>
    <div class="fc-card ${st.flipped ? 'flipped' : ''}" onclick="flipFlash('${blockId}')">
      <div class="fc-face fc-front">${escapeHtml(p.term)}</div>
      <div class="fc-face fc-back">${escapeHtml(p.definition)}</div>
    </div>
    <div class="fc-hint">לחצו על הכרטיס כדי לראות את התשובה</div>
    <div class="fc-controls">
      <button class="btn-nav btn-prev" onclick="flashNav('${blockId}',-1)">→ קודם</button>
      <button class="btn-nav btn-next" onclick="flashNav('${blockId}',1)">הבא ←</button>
    </div>
  `;
}

function flipFlash(blockId) {
  const st = gameStates[blockId];
  st.flipped = !st.flipped;
  paintFlash(blockId);
}

function resetFlashGame(blockId) {
  const st = gameStates[blockId];
  if (!st) return;
  st.idx = 0;
  st.flipped = false;
  paintFlash(blockId);
}

function flashNav(blockId, dir) {
  const st = gameStates[blockId];
  if (!st.pairs.length) return;
  st.idx = (st.idx + dir + st.pairs.length) % st.pairs.length;
  st.flipped = false;
  paintFlash(blockId);
}

// ---- שמירת תשובות לשאלות אישיות ----

async function saveLessonAnswerCore(unitId, blockId, text, statusEl) {
  if (statusEl) { statusEl.textContent = 'שומר... (ייתכן שהצ׳אטבוט בודק את התשובה, זה יכול לקחת כמה שניות)'; statusEl.style.color = 'var(--muted)'; }
  try {
    const res = await callAPI('saveLessonAnswer', { group_id: groupData.group_id, unit_id: unitId, block_id: blockId, answer_text: text });
    let oldScore = 0;
    allLessons.forEach(l => (l.blocks || []).forEach(b => {
      if (b.block_id === blockId) {
        oldScore = Number(b.saved_score) || 0;
        b.saved_answer   = text;
        b.saved_score    = res.score === '' ? null : res.score;
        b.saved_feedback = res.score_feedback || '';
      }
    }));
    if (statusEl) { statusEl.textContent = '✓ נשמר'; statusEl.style.color = 'var(--success)'; }

    const scorePill = document.getElementById('qa_score_' + blockId);
    const feedbackEl = document.getElementById('qa_feedback_' + blockId);
    if (scorePill) scorePill.innerHTML = (res.score !== '' && res.score != null) ? `⭐ ${res.score}/10` : '';
    if (feedbackEl) feedbackEl.textContent = res.score_feedback || '';

    if (res.score !== '' && res.score != null) {
      const newScore = Number(res.score) || 0;
      const badgeVal = document.getElementById('scoreValue');
      const current = Number(badgeVal.textContent) || 0;
      updateScoreBadge(current - oldScore + newScore);
    }
  } catch (e) {
    if (statusEl) { statusEl.textContent = 'שגיאה: ' + e.message; statusEl.style.color = 'var(--error)'; }
  }
}

function saveQABlock(unitId, blockId) {
  const ta = document.getElementById('qa_' + blockId);
  const status = document.getElementById('qa_status_' + blockId);
  saveLessonAnswerCore(unitId, blockId, ta.value, status);
}

function saveQASection(unitId, blockId) {
  const ta = document.getElementById('qa_sec_' + blockId);
  const status = document.getElementById('qa_sec_status_' + blockId);
  saveLessonAnswerCore(unitId, blockId, ta.value, status);
}

function jumpToSectionFromLesson(sectionNum) {
  closeLessons();
  navigateTo(sectionNum);
}

// ========== מצב מצגת (זהה בעקרונו לזה שבממשק המורה) ==========

let presentLesson = null;
let presentIdx    = 0;

function openLessonPresentation(unitId) {
  presentLesson = allLessons.find(l => l.unit_id === unitId);
  if (!presentLesson || !presentLesson.blocks || !presentLesson.blocks.length) return;
  presentIdx = 0;
  document.getElementById('presentUnitName').textContent = presentLesson.unit_name;
  document.getElementById('presentOverlay').classList.add('show');
  document.addEventListener('keydown', presentKeyHandler);
  renderPresentSlide();
}

function closePresentation() {
  document.getElementById('presentOverlay').classList.remove('show');
  document.removeEventListener('keydown', presentKeyHandler);
  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
}

function presentKeyHandler(e) {
  if (e.key === 'Escape') closePresentation();
  if (e.key === 'ArrowLeft') presentNav(1);
  if (e.key === 'ArrowRight') presentNav(-1);
}

function togglePresentFullscreen() {
  const el = document.getElementById('presentOverlay');
  if (!document.fullscreenElement) el.requestFullscreen().catch(() => {});
  else document.exitFullscreen().catch(() => {});
}

function presentNav(dir) {
  const blocks = presentLesson.blocks || [];
  const next = presentIdx + dir;
  if (next < 0 || next >= blocks.length) return;
  presentIdx = next;
  renderPresentSlide();
}

/** משתמש חוזר ברנדור הבלוקים הרגיל (renderTeachBlock/renderQuestionBlock/paintGame) — אותו תוכן, עיצוב גדול יותר. */
function renderPresentSlide() {
  const blocks = presentLesson.blocks || [];
  const block  = blocks[presentIdx];
  const stage  = document.getElementById('presentSlide');
  const glossary = getGlossaryForLesson(presentLesson);

  document.getElementById('presentCounter').textContent = (presentIdx + 1) + ' / ' + blocks.length;
  document.getElementById('presentPrevBtn').disabled = presentIdx === 0;
  document.getElementById('presentNextBtn').disabled = presentIdx === blocks.length - 1;

  if (block.block_type === 'teach') {
    stage.innerHTML = renderTeachBlock(block, glossary);
  } else if (block.block_type === 'question') {
    stage.innerHTML = renderQuestionBlock(presentLesson.unit_id, block, glossary);
  } else if (block.block_type === 'quiz') {
    stage.innerHTML = renderQuizBlock(block, glossary);
  } else if (block.block_type === 'question_structured') {
    stage.innerHTML = renderStructuredQuestionBlock(presentLesson.unit_id, block, glossary);
  } else if (block.block_type === 'game') {
    stage.innerHTML = renderGameBlockShell(block);
    if (!gameStates[block.block_id]) gameStates[block.block_id] = block.game_type === 'memory' ? initMemoryState(block) : initFlashState(block);
    paintGame(block.block_id, block.game_type);
  }
}

function goBack() { window.location.href = TICHER_URL + 'student.html'; }
