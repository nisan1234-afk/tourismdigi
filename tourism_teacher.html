<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תיירות דיגיטלית — ממשק מורה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #3B82F6; --blue-dark: #2563EB; --blue-light: #93C5FD;
      --dark: #0A0F1E; --dark2: #111827; --dark3: #1F2937; --dark4: #374151;
      --text: #F9FAFB; --muted: #9CA3AF; --error: #EF4444;
      --success: #10B981; --warning: #F59E0B;
      --teal: #14B8A6; --purple: #8B5CF6; --purple-light: #A78BFA;
    }
    body { font-family: 'Heebo', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

    .topbar { background: var(--dark2); border-bottom: 1px solid rgba(255,255,255,0.07); padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .topbar-logo { font-size: 17px; font-weight: 800; background: linear-gradient(135deg, var(--blue-light), var(--purple-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .topbar-subject { font-size: 12px; font-weight: 700; color: var(--teal); background: rgba(20,184,166,0.1); border: 1px solid rgba(20,184,166,0.25); border-radius: 6px; padding: 3px 10px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .user-name { font-size: 13px; font-weight: 700; }
    .btn-sm { padding: 6px 12px; border-radius: 8px; font-family: 'Heebo', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-back { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: var(--muted); }
    .btn-back:hover { border-color: var(--blue); color: var(--blue-light); }
    .btn-logout { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: var(--muted); }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .btn-warning { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .btn-danger  { background: rgba(239,68,68,0.15); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }

    .main { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px; }
    .stat-num { font-size: 26px; font-weight: 800; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* TABS */
    .tabs-row { display: flex; gap: 4px; margin-bottom: 20px; background: var(--dark2); border-radius: 12px; padding: 4px; border: 1px solid rgba(255,255,255,0.07); width: fit-content; }
    .tab-btn { padding: 8px 18px; border: none; border-radius: 9px; background: transparent; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: var(--teal); color: white; font-weight: 700; }

    .screen { display: none; }
    .screen.show { display: block; }

    /* PAIRS TABLE */
    .card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .card-title { font-size: 15px; font-weight: 700; }
    .search-input { padding: 7px 12px; background: var(--dark3); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 13px; outline: none; width: 200px; direction: rtl; }

    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid rgba(255,255,255,0.07); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 10px 14px; text-align: right; background: var(--dark3); color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.07); white-space: nowrap; }
    td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* PROGRESS BAR */
    .prog-wrap { display: flex; align-items: center; gap: 8px; min-width: 140px; }
    .prog-bar { flex: 1; height: 6px; background: var(--dark4); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--teal), var(--blue)); }
    .prog-pct { font-size: 11px; font-weight: 700; color: var(--teal); min-width: 30px; }

    /* CONTRIBUTION PILLS */
    .contrib-wrap { display: flex; gap: 4px; flex-wrap: wrap; }
    .contrib-pill { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
    .pill-s1   { background: rgba(59,130,246,0.15); color: var(--blue-light); }
    .pill-s2   { background: rgba(20,184,166,0.15); color: var(--teal); }
    .pill-pair { background: rgba(139,92,246,0.15); color: var(--purple-light); }

    /* LAST ACTIVE */
    .la-recent { color: var(--success); font-size: 12px; }
    .la-mid    { color: var(--warning); font-size: 12px; }
    .la-old    { color: var(--error); font-size: 12px; }
    .la-none   { color: var(--muted); font-size: 12px; }

    /* SECTION CELLS */
    .sections-mini { display: flex; gap: 3px; }
    .sec-dot { width: 14px; height: 14px; border-radius: 3px; font-size: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .sec-dot.done { background: rgba(16,185,129,0.25); color: var(--success); }
    .sec-dot.empty { background: var(--dark4); color: var(--muted); }
    .sec-dot.current { background: rgba(59,130,246,0.25); color: var(--blue-light); }

    /* BADGE */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .badge-error   { background: rgba(239,68,68,0.15); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
    .badge-blue    { background: rgba(59,130,246,0.15); color: var(--blue-light); border: 1px solid rgba(59,130,246,0.3); }

    /* UNITS */
    .units-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .unit-card { background: var(--dark3); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px; transition: all 0.2s; }
    .unit-card.open { border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.03); }
    .unit-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .unit-meta { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .unit-toggle { display: flex; align-items: center; justify-content: space-between; }
    .toggle-switch { position: relative; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--dark4); border-radius: 12px; cursor: pointer; transition: 0.3s; }
    .toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; right: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.3s; }
    input:checked + .toggle-slider { background: var(--success); }
    input:checked + .toggle-slider:before { transform: translateX(-20px); }

    /* ADD PAIR FORM */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    input[type=text], input[type=email], select { width: 100%; padding: 10px 12px; background: var(--dark3); border: 1px solid rgba(255,255,255,0.07); border-radius: 9px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 13px; outline: none; direction: rtl; }
    input:focus, select:focus { border-color: rgba(20,184,166,0.4); }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--dark2); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .modal-title { font-size: 17px; font-weight: 800; margin-bottom: 20px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-modal-cancel { padding: 9px 16px; background: transparent; border: 1px solid rgba(255,255,255,0.15); border-radius: 9px; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 13px; cursor: pointer; }
    .btn-modal-confirm { padding: 9px 16px; background: var(--teal); border: none; border-radius: 9px; color: white; font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }

    /* SECTIONS DETAIL */
    .sections-detail { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 14px; }
    .sec-detail { background: var(--dark3); border-radius: 8px; padding: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
    .sec-detail.done { border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.05); }
    .sec-detail-num { font-size: 10px; color: var(--muted); }
    .sec-detail-icon { font-size: 18px; margin: 4px 0; }
    .sec-detail-name { font-size: 10px; color: var(--muted); }

    .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { padding: 30px; text-align: center; color: var(--muted); font-size: 13px; }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .main { padding: 14px; }
      .topbar { padding: 0 14px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">כיתה פלוס</div>
    <div class="topbar-subject">🗺️ תיירות דיגיטלית</div>
  </div>
  <div class="topbar-right">
    <div class="user-name" id="userName">טוען...</div>
    <button class="btn-sm btn-back" onclick="goBack()">← דשבורד</button>
    <button class="btn-sm btn-logout" onclick="logout()">יציאה</button>
  </div>
</div>

<div class="main">

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" style="color:var(--blue-light)" id="stPairs">—</div><div class="stat-label">זוגות</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--teal)" id="stAvg">—</div><div class="stat-label">התקדמות ממוצעת</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--success)" id="stDone">—</div><div class="stat-label">סיימו</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--warning)" id="stInProgress">—</div><div class="stat-label">בתהליך</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--error)" id="stStuck">—</div><div class="stat-label">תקועים</div></div>
  </div>

  <div class="tabs-row">
    <button class="tab-btn active" onclick="switchTab('pairs', this)">זוגות</button>
    <button class="tab-btn" onclick="switchTab('units', this)">יחידות לימוד</button>
    <button class="tab-btn" onclick="switchTab('addpair', this)">+ הוסף זוג</button>
  </div>

  <!-- זוגות -->
  <div class="screen show" id="tab-pairs">
    <div class="card">
      <div class="card-header">
        <div class="card-title">כל הזוגות</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <input class="search-input" type="text" placeholder="חיפוש..." oninput="filterPairs(this.value)" />
          <select id="filterStatus" style="width:120px;padding:7px 10px;" onchange="filterPairs(document.querySelector('.search-input').value)">
            <option value="">כולם</option>
            <option value="active">פעילים</option>
            <option value="stuck">תקועים</option>
            <option value="done">סיימו</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>אתר</th>
              <th>תלמיד 1</th>
              <th>תלמיד 2</th>
              <th>סעיפים</th>
              <th>התקדמות</th>
              <th>תרומה</th>
              <th>פעילות</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="pairsBody">
            <tr><td colspan="8" class="empty-state"><span class="loading-spinner"></span> טוען...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- יחידות -->
  <div class="screen" id="tab-units">
    <div class="card">
      <div class="card-header">
        <div class="card-title">יחידות לימוד</div>
        <button class="btn-sm btn-primary" onclick="showModal('addUnitModal')">+ יחידה חדשה</button>
      </div>
      <div class="units-grid" id="unitsGrid">
        <div class="empty-state">טוען יחידות...</div>
      </div>
    </div>
  </div>

  <!-- הוספת זוג -->
  <div class="screen" id="tab-addpair">
    <div class="card" style="max-width:500px;">
      <div class="card-title" style="margin-bottom:20px;">הוספת זוג חדש</div>
      <div class="form-group"><label>מייל תלמיד 1</label><input type="email" id="s1Email" placeholder="student1@gmail.com" /></div>
      <div class="form-group"><label>מייל תלמיד 2 (אופציונלי)</label><input type="email" id="s2Email" placeholder="student2@gmail.com" /></div>
      <div class="form-group"><label>כיתה</label><input type="text" id="pairClass" placeholder="י1" /></div>
      <button class="btn-sm btn-primary" style="padding:10px 20px;" onclick="addPair()">צור זוג</button>
      <div id="addPairResult" style="margin-top:12px;font-size:13px;"></div>
    </div>
  </div>

</div>

<!-- מודל פרטי זוג -->
<div class="modal-overlay" id="pairModal">
  <div class="modal">
    <div class="modal-title" id="pairModalTitle">פרטי זוג</div>
    <div id="pairModalContent"></div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="hideModal('pairModal')">סגור</button>
    </div>
  </div>
</div>

<!-- מודל יחידה חדשה -->
<div class="modal-overlay" id="addUnitModal">
  <div class="modal">
    <div class="modal-title">יחידה חדשה</div>
    <div class="form-group"><label>שם היחידה</label><input type="text" id="unitName" placeholder="רשתות חברתיות" /></div>
    <div class="form-group">
      <label>סעיף מקושר</label>
      <select id="unitSection">
        <option value="1">סעיף 1 — פרטי האתר</option>
        <option value="2">סעיף 2 — תיאור כללי</option>
        <option value="3">סעיף 3 — נוכחות דיגיטלית</option>
        <option value="4">סעיף 4 — מושגים</option>
        <option value="5">סעיף 5 — חוויית משתמש</option>
        <option value="6">סעיף 6 — עוצמות</option>
        <option value="7">סעיף 7 — הצעות לשיפור</option>
        <option value="8">סעיף 8 — סיכום אישי</option>
      </select>
    </div>
    <div class="form-group">
      <label>מצב</label>
      <select id="unitOpenNow">
        <option value="false">סגור — אפתח ידנית</option>
        <option value="true">פתוח עכשיו</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="hideModal('addUnitModal')">ביטול</button>
      <button class="btn-modal-confirm" onclick="createUnit()">צור יחידה</button>
    </div>
  </div>
</div>

<script>
const TICHER_URL = 'https://nisan1234-afk.github.io/TICHER/';
const API_URL    = 'https://script.google.com/macros/s/AKfycbxZ6mV34krIaH1MkIerwnAiEaQEqrjFSoQrln10Au20X-kbfe3UW8Bac9IP4RYzUqd4/exec';

const SECTION_NAMES = ['','פרטי האתר','תיאור כללי','נוכחות דיגיטלית','מושגים','חוויית משתמש','עוצמות','הצעות לשיפור','סיכום אישי'];
const SECTION_ICONS = ['','📍','📄','📱','📚','🖥️','💪','💡','✍️'];

let currentUser = null;
let allPairs    = [];
let allUnits    = [];

window.onload = async function() {
  const stored = sessionStorage.getItem('kitahUser');
  if (!stored) { window.location.href = TICHER_URL; return; }
  currentUser = JSON.parse(stored);
  document.getElementById('userName').textContent = currentUser.name || currentUser.email.split('@')[0];
  await loadData();
};

async function callAPI(action, params = {}) {
  const res  = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, token: currentUser.token, ...params }) });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error);
  return data.data;
}

async function loadData() {
  try {
    const data = await callAPI('getTeacherDashboard');
    allPairs   = data.pairs || [];
    allUnits   = data.units || [];
    renderStats();
    renderPairs(allPairs);
    renderUnits();
  } catch(e) {
    document.getElementById('pairsBody').innerHTML = '<tr><td colspan="8" class="empty-state">שגיאה: ' + e.message + '</td></tr>';
  }
}

function renderStats() {
  const total      = allPairs.length;
  const avg        = total ? Math.round(allPairs.reduce((s, p) => s + p.percent, 0) / total) : 0;
  const done       = allPairs.filter(p => p.percent === 100).length;
  const inProgress = allPairs.filter(p => p.percent > 0 && p.percent < 100).length;
  const stuck      = allPairs.filter(p => {
    if (!p.last_active) return true;
    return Date.now() - new Date(p.last_active).getTime() > 7 * 24 * 60 * 60 * 1000;
  }).length;
  document.getElementById('stPairs').textContent      = total;
  document.getElementById('stAvg').textContent        = avg + '%';
  document.getElementById('stDone').textContent       = done;
  document.getElementById('stInProgress').textContent = inProgress;
  document.getElementById('stStuck').textContent      = stuck;
}

function renderPairs(pairs) {
  const tbody = document.getElementById('pairsBody');
  if (!pairs.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty-state">אין זוגות — הוסף מהטאב "הוסף זוג"</td></tr>'; return; }

  tbody.innerHTML = pairs.map(p => {
    // סרגל התקדמות
    const prog = `<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${p.percent}%"></div></div><div class="prog-pct">${p.percent}%</div></div>`;

    // נקודות סעיפים
    const cur = parseInt(p.current_section) || 1;
    const dots = Array.from({length:8},(_,i)=>{
      const n = i+1;
      const cls = n < cur ? 'done' : n === cur ? 'current' : 'empty';
      const txt = n < cur ? '✓' : n === cur ? String(n) : String(n);
      return `<div class="sec-dot ${cls}" title="סעיף ${n}: ${SECTION_NAMES[n]}">${txt}</div>`;
    }).join('');

    // תרומה
    const c = p.contribution || {student1:0,student2:0,pair:0};
    const contrib = `<div class="contrib-wrap">
      <span class="contrib-pill pill-s1">ת1:${c.student1}%</span>
      <span class="contrib-pill pill-s2">ת2:${c.student2}%</span>
      <span class="contrib-pill pill-pair">זוג:${c.pair}%</span>
    </div>`;

    // פעילות
    const diff = p.last_active ? Date.now() - new Date(p.last_active).getTime() : Infinity;
    const days = Math.floor(diff / 86400000);
    const hrs  = Math.floor(diff / 3600000);
    const mins = Math.floor(diff / 60000);
    const laText = !p.last_active ? 'לא פעיל' : mins < 60 ? 'לפני '+mins+' דק\'' : hrs < 24 ? 'לפני '+hrs+' שע\'' : 'לפני '+days+' ימים';
    const laCls  = !p.last_active ? 'la-none' : days > 7 ? 'la-old' : days > 2 ? 'la-mid' : 'la-recent';

    const s1 = p.student1_email ? p.student1_email.split('@')[0] : '—';
    const s2 = p.student2_email ? p.student2_email.split('@')[0] : '—';

    return `<tr>
      <td><strong>${p.site_name || '—'}</strong>${p.site_url ? '<br><a href="'+p.site_url+'" target="_blank" style="font-size:11px;color:var(--blue-light);">🔗 קישור</a>' : ''}</td>
      <td>${s1}</td>
      <td>${s2}</td>
      <td><div class="sections-mini">${dots}</div></td>
      <td>${prog}</td>
      <td>${contrib}</td>
      <td><span class="${laCls}">${days > 7 ? '⚠️ ' : ''}${laText}</span></td>
      <td><button class="btn-sm btn-back" onclick="openPairModal('${p.pair_id}')">פרטים</button></td>
    </tr>`;
  }).join('');
}

function filterPairs(q) {
  const status = document.getElementById('filterStatus').value;
  let filtered = allPairs;
  if (q) filtered = filtered.filter(p => (p.site_name||'').includes(q) || (p.student1_email||'').includes(q) || (p.student2_email||'').includes(q));
  if (status === 'done')   filtered = filtered.filter(p => p.percent === 100);
  if (status === 'stuck')  filtered = filtered.filter(p => { const d = p.last_active ? (Date.now()-new Date(p.last_active).getTime())/86400000 : 999; return d > 7; });
  if (status === 'active') filtered = filtered.filter(p => { const d = p.last_active ? (Date.now()-new Date(p.last_active).getTime())/86400000 : 999; return d <= 7 && p.percent < 100; });
  renderPairs(filtered);
}

async function openPairModal(pair_id) {
  const pair = allPairs.find(p => p.pair_id === pair_id);
  if (!pair) return;
  document.getElementById('pairModalTitle').textContent = (pair.site_name || 'זוג') + ' — פרטים';
  document.getElementById('pairModalContent').innerHTML = '<div class="empty-state"><span class="loading-spinner"></span></div>';
  showModal('pairModal');

  try {
    const data = await callAPI('getPairData', { pair_id });
    const sections = data.sections || {};
    const c = data.contribution || {student1:0, student2:0, pair:0};

    const secCells = Array.from({length:8},(_,i)=>{
      const n = i+1;
      const done = sections['section_'+n] ? true : false;
      return `<div class="sec-detail ${done?'done':''}">
        <div class="sec-detail-num">סעיף ${n}</div>
        <div class="sec-detail-icon">${done?'✅':SECTION_ICONS[n]}</div>
        <div class="sec-detail-name">${SECTION_NAMES[n]}</div>
      </div>`;
    }).join('');

    document.getElementById('pairModalContent').innerHTML = `
      ${pair.site_url ? '<a href="'+pair.site_url+'" target="_blank" style="color:var(--blue-light);font-size:13px;display:block;margin-bottom:14px;">🔗 '+pair.site_url+'</a>' : ''}
      <div class="sections-detail">${secCells}</div>
      <div style="margin-top:16px;padding:14px;background:var(--dark3);border-radius:10px;">
        <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;">תרומה לפרויקט</div>
        <div class="contrib-wrap">
          <span class="contrib-pill pill-s1" style="font-size:12px;padding:4px 10px;">תלמיד 1 (solo): ${c.student1}%</span>
          <span class="contrib-pill pill-s2" style="font-size:12px;padding:4px 10px;">תלמיד 2 (solo): ${c.student2}%</span>
          <span class="contrib-pill pill-pair" style="font-size:12px;padding:4px 10px;">ביחד: ${c.pair}%</span>
        </div>
      </div>
    `;
  } catch(e) {
    document.getElementById('pairModalContent').innerHTML = '<div class="empty-state">שגיאה: ' + e.message + '</div>';
  }
}

function renderUnits() {
  const grid = document.getElementById('unitsGrid');
  if (!allUnits.length) { grid.innerHTML = '<div class="empty-state">אין יחידות — צור יחידה חדשה</div>'; return; }
  grid.innerHTML = allUnits.map((u, i) => {
    const isOpen = u.is_open === 'TRUE' || u.is_open === true;
    return `<div class="unit-card ${isOpen?'open':''}">
      <div class="unit-name">${u.unit_name}</div>
      <div class="unit-meta">${SECTION_ICONS[u.section_linked]||''} סעיף ${u.section_linked} — ${SECTION_NAMES[u.section_linked]||''}</div>
      <div class="unit-toggle">
        <span style="font-size:12px;color:${isOpen?'var(--success)':'var(--muted)'}">${isOpen?'פתוח':'סגור'}</span>
        <label class="toggle-switch">
          <input type="checkbox" ${isOpen?'checked':''} onchange="toggleUnit('${u.unit_id}',this.checked,${i})">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>`;
  }).join('');
}

async function toggleUnit(unit_id, is_open, idx) {
  try {
    await callAPI('toggleUnit', { unit_id, is_open });
    allUnits[idx].is_open = is_open ? 'TRUE' : 'FALSE';
    renderUnits();
  } catch(e) { alert('שגיאה: ' + e.message); }
}

async function createUnit() {
  const name    = document.getElementById('unitName').value.trim();
  const section = document.getElementById('unitSection').value;
  const isOpen  = document.getElementById('unitOpenNow').value === 'true';
  if (!name) { alert('נא להכניס שם'); return; }
  try {
    await callAPI('toggleUnit', { unit_id: 'unit_'+Date.now(), is_open: isOpen, unit_name: name, section_linked: section });
    hideModal('addUnitModal');
    document.getElementById('unitName').value = '';
    await loadData();
  } catch(e) { alert('שגיאה: ' + e.message); }
}

async function addPair() {
  const s1    = document.getElementById('s1Email').value.trim();
  const s2    = document.getElementById('s2Email').value.trim();
  const cls   = document.getElementById('pairClass').value.trim();
  const resEl = document.getElementById('addPairResult');
  if (!s1) { resEl.textContent = 'נא להכניס מייל תלמיד 1'; resEl.style.color = 'var(--error)'; return; }
  resEl.textContent = 'יוצר זוג...'; resEl.style.color = 'var(--muted)';
  try {
    await callAPI('addPair', { student1_email: s1, student2_email: s2, class_id: cls });
    resEl.textContent = '✅ הזוג נוצר בהצלחה!'; resEl.style.color = 'var(--success)';
    document.getElementById('s1Email').value = '';
    document.getElementById('s2Email').value = '';
    document.getElementById('pairClass').value = '';
    await loadData();
  } catch(e) { resEl.textContent = 'שגיאה: ' + e.message; resEl.style.color = 'var(--error)'; }
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('show');
}

function showModal(id) { document.getElementById(id).classList.add('show'); }
function hideModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', function(e){ if(e.target===this) this.classList.remove('show'); }));

function goBack()  { window.location.href = TICHER_URL + 'teacher.html'; }
function logout()  { sessionStorage.removeItem('kitahUser'); window.location.href = TICHER_URL; }
</script>
</body>
</html>
